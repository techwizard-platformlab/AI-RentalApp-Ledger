name: "Infra"

# =============================================================================
# Unified infrastructure workflow — plan / apply / destroy.
#
# Triggers
#   pull_request_target → auto plan preview on infrastructure PRs
#   workflow_dispatch   → manual: choose action, cloud, env, scope
#
# Actions
#   plan    → terraform plan + OPA cost check (tf_plan_cost.rego)
#   apply   → uses saved plan binary (exact approved plan)
#   destroy → compute-only (AKS/GKE + VNet, keeps ACR/SQL/KV) or full
#             NOTE: always manual — no scheduled destroy
#
# Approval gates  (ALL apply and destroy require human approval)
#   Manual apply/destroy → pauses at "terraform-destructive-approval" environment
#   Non-dev operations   → confirm field must match env name before gate fires
#
# Auth
#   Azure → OIDC / federated credential (no client secret)
#   GCP   → OIDC (workload identity)
#
# Public-repo security
#   Fork PRs can trigger plan-only but cannot access secrets (fork check below).
#   Apply and destroy are workflow_dispatch-only.
#
# Setup (one-time)
#   repo Settings → Environments → create "terraform-destructive-approval"
#   → add yourself as required reviewer
# =============================================================================

on:
  # Pull-request plan preview — runs in the context of the BASE branch (main)
  # so secrets are available for internal contributors; forks are blocked below.
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "infrastructure/**"
      - "platform/security/policies/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa, uat, prod]

      cloud:
        description: "Target cloud"
        required: true
        default: "azure"
        type: choice
        options: [azure, gcp, both]

      action:
        description: "Action to run"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

      scope:
        description: "Destroy scope (only used when action=destroy)"
        required: false
        default: "compute-only"
        type: choice
        options: [compute-only, full]

      confirm:
        description: "For apply/destroy: type the environment name to confirm"
        required: false
        default: ""
        type: string

concurrency:
  group: terraform-${{ github.event.inputs.target_env || 'dev' }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write   # required for GCP OIDC

env:
  TF_VERSION: "1.5.7"
  DISCORD_WEBHOOK_URL: ""         # populated at runtime from Key Vault
  ARM_USE_AZUREAD_AUTH: "true"    # use Azure AD auth for backend storage (no access key needed)

jobs:

  # ===========================================================================
  # JOB: setup — resolve trigger inputs into shared outputs
  # ===========================================================================
  setup:
    name: "Resolve inputs"
    runs-on: ubuntu-latest
    outputs:
      env:       ${{ steps.resolve.outputs.env }}
      action:    ${{ steps.resolve.outputs.action }}
      scope:     ${{ steps.resolve.outputs.scope }}
      run_azure: ${{ steps.resolve.outputs.run_azure }}
      run_gcp:   ${{ steps.resolve.outputs.run_gcp }}
      scheduled: ${{ steps.resolve.outputs.scheduled }}

    steps:
      # ── Fork protection ───────────────────────────────────────────────────────
      # For pull_request_target from a fork: exit immediately so secrets are
      # never exposed. Internal branches (same repo) proceed normally.
      - name: Block fork PRs from accessing secrets
        if: |
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.head.repo.fork == true
        run: |
          echo "::error::Fork PRs cannot trigger infrastructure plans. Open a branch in this repo."
          exit 1

      - name: Resolve trigger inputs
        id: resolve
        run: |
          TRIGGER="${{ github.event_name }}"

          if [ "$TRIGGER" = "pull_request_target" ]; then
            echo "env=dev"         >> $GITHUB_OUTPUT
            echo "action=plan"     >> $GITHUB_OUTPUT
            echo "scope=full"      >> $GITHUB_OUTPUT
            echo "run_azure=true"  >> $GITHUB_OUTPUT
            echo "run_gcp=false"   >> $GITHUB_OUTPUT
            echo "scheduled=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # workflow_dispatch
          ENV="${{ github.event.inputs.target_env }}"
          ACTION="${{ github.event.inputs.action }}"
          CLOUD="${{ github.event.inputs.cloud }}"
          SCOPE="${{ github.event.inputs.scope }}"
          CONFIRM="${{ github.event.inputs.confirm }}"

          # Safety: apply/destroy requires confirm field = env name
          if [ "$ACTION" != "plan" ] && [ "$CONFIRM" != "$ENV" ]; then
            echo "ERROR: For $ACTION on $ENV you must type the environment name in the confirm field."
            exit 1
          fi

          echo "env=$ENV"           >> $GITHUB_OUTPUT
          echo "action=$ACTION"     >> $GITHUB_OUTPUT
          echo "scope=$SCOPE"       >> $GITHUB_OUTPUT
          echo "scheduled=false"    >> $GITHUB_OUTPUT

          [ "$CLOUD" = "azure" ] || [ "$CLOUD" = "both" ] && \
            echo "run_azure=true" >> $GITHUB_OUTPUT || echo "run_azure=false" >> $GITHUB_OUTPUT
          [ "$CLOUD" = "gcp" ]   || [ "$CLOUD" = "both" ] && \
            echo "run_gcp=true"  >> $GITHUB_OUTPUT || echo "run_gcp=false"  >> $GITHUB_OUTPUT

  # ===========================================================================
  # AZURE — Plan
  # Runs terraform plan, detects destroys, uploads plan binary as artifact.
  # Skipped entirely when action=destroy (no plan needed before destroy).
  # ===========================================================================
  azure_plan:
    name: "Azure Plan / ${{ needs.setup.outputs.env }}"
    runs-on: ubuntu-latest
    needs: setup
    if: |
      needs.setup.outputs.run_azure == 'true' &&
      needs.setup.outputs.action != 'destroy'

    outputs:
      has_destroys:  ${{ steps.check_destroys.outputs.has_destroys }}
      destroy_count: ${{ steps.check_destroys.outputs.destroy_count }}
      destroy_list:  ${{ steps.check_destroys.outputs.destroy_list }}

    defaults:
      run:
        working-directory: infrastructure/azure/environments/${{ needs.setup.outputs.env }}

    env:
      ARM_USE_OIDC:        "true"
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_environment:                  ${{ needs.setup.outputs.env }}
      TF_VAR_github_actions_principal_id:  ${{ secrets.TF_GITHUB_ACTIONS_PRINCIPAL_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Azure OIDC login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        run: |
          # Platform KV name resolved from secret (set during bootstrap)
          KV="${{ secrets.PLATFORM_KV_NAME }}"
          DISCORD=$(az keyvault secret show --vault-name "$KV" --name "discord-webhook-url" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$DISCORD" ]]; then
            echo "::add-mask::$DISCORD"
            echo "DISCORD_WEBHOOK_URL=$DISCORD" >> "$GITHUB_ENV"
          fi

          GH_PAT=$(az keyvault secret show --vault-name "$KV" --name "github-pat" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$GH_PAT" ]]; then
            echo "::add-mask::$GH_PAT"
            echo "TF_VAR_github_token=$GH_PAT" >> "$GITHUB_ENV"
          else
            echo "::error::Failed to fetch github-pat from Key Vault $KV"
            exit 1
          fi

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      - name: Terraform init
        id: init
        run: |
          CONTAINER="rentalapp-${{ needs.setup.outputs.env }}-tfstate"
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=${CONTAINER}"

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: set -o pipefail; terraform plan -out=tfplan.binary -no-color 2>&1 | tee plan.txt

      - name: Convert plan to JSON
        run: terraform show -json tfplan.binary > tfplan.json

      # ── OPA cost check (terraform plan JSON — no external API needed) ────────
      - name: Install conftest
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/

      - name: OPA cost check
        id: opa_cost
        run: |
          set +e
          
          # Print native text format directly to the Actions terminal log
          echo "==== OPA Cost Check Terminal Output ===="
          conftest test tfplan.json \
            --namespace cost_tfplan \
            --policy ../../../../platform/security/policies/cost/tf_plan_cost.rego
          
          # Generate JSON for the GitHub Step Summary UI panel
          conftest test tfplan.json \
            --namespace cost_tfplan \
            --policy ../../../../platform/security/policies/cost/tf_plan_cost.rego \
            --output json > opa-cost-result.json 2>&1
          OPA_EXIT=$?
          echo "exit_code=${OPA_EXIT}" >> "$GITHUB_OUTPUT"

          echo "### OPA Cost Check" >> "$GITHUB_STEP_SUMMARY"
          echo "Budget: \$22/month | Pattern: deploy-destroy (88 hrs/month)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          python3 - >> "$GITHUB_STEP_SUMMARY" <<'PYEOF'
          import json
          try:
              data = json.load(open("opa-cost-result.json"))
          except Exception:
              print("_No result data_"); exit(0)
          failures = [f for r in data for f in r.get("failures", [])]
          warnings = [w for r in data for w in r.get("warnings", [])]
          if failures:
              print("**DENY**"); [print(f"> {f['msg']}") for f in failures]
          if warnings:
              print("**WARN**"); [print(f"> {w['msg']}") for w in warnings]
          if not failures and not warnings:
              print("Cost within budget.")
          PYEOF
          set -e

      # Detect any delete or replace operations in the plan.
      - name: Detect destructive changes
        id: check_destroys
        run: |
          DESTROY_COUNT=$(jq '[.resource_changes[] | select(.change.actions | contains(["delete"]))] | length' tfplan.json)
          DESTROY_LIST=$(jq -r '
            [.resource_changes[] | select(.change.actions | contains(["delete"]))]
            | .[]
            | "  - \(.address)  [\(.change.actions | join(" + "))]"
          ' tfplan.json)

          echo "destroy_count=$DESTROY_COUNT" >> $GITHUB_OUTPUT

          if [ "$DESTROY_COUNT" -gt 0 ]; then
            echo "has_destroys=true" >> $GITHUB_OUTPUT
            {
              echo "destroy_list<<DESTROY_EOF"
              echo "$DESTROY_LIST"
              echo "DESTROY_EOF"
            } >> $GITHUB_OUTPUT
            echo "::warning::⚠️ $DESTROY_COUNT resource(s) will be DESTROYED — manual approval required"
            echo "$DESTROY_LIST"
          else
            echo "has_destroys=false" >> $GITHUB_OUTPUT
            echo "destroy_list=none"  >> $GITHUB_OUTPUT
          fi

      - name: Upload plan artifact
        if: needs.setup.outputs.action == 'apply' && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-azure-${{ needs.setup.outputs.env }}-${{ github.run_id }}
          path: infrastructure/azure/environments/${{ needs.setup.outputs.env }}/tfplan.binary
          retention-days: 1

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            const planPath = `infrastructure/azure/environments/${{ needs.setup.outputs.env }}/plan.txt`;
            const plan = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, 'utf8').slice(-60000)
              : 'Plan unavailable';
            const icon = s => s === 'success' ? 'OK' : s === 'failure' ? 'FAIL' : 'SKIP';
            const hasDestroys = '${{ steps.check_destroys.outputs.has_destroys }}' === 'true';
            const destroyBadge = hasDestroys
              ? '\n> ⚠️ **${{ steps.check_destroys.outputs.destroy_count }} resource(s) will be DESTROYED — approval required**\n'
              : '';
            const opaStatus = '${{ steps.opa_cost.outputs.exit_code }}' === '0' ? 'OK' : 'FAIL';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Azure \`${{ needs.setup.outputs.env }}\` Terraform Plan\n${destroyBadge}\n| Step | Status |\n|------|--------|\n| fmt | ${icon('${{ steps.fmt.outcome }}')} |\n| init | ${icon('${{ steps.init.outcome }}')} |\n| validate | ${icon('${{ steps.validate.outcome }}')} |\n| plan | ${icon('${{ steps.plan.outcome }}')} |\n| cost (OPA) | ${opaStatus} |\n\`\`\`hcl\n${plan}\n\`\`\``
            });

      - name: Job summary
        if: always()
        run: |
          echo "### Azure ${{ needs.setup.outputs.env }} — Plan" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Destroys | ${{ steps.check_destroys.outputs.destroy_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Azure ${{ needs.setup.outputs.env }} — Plan (OPA: ${{ steps.opa_cost.outputs.exit_code == '0' && 'OK' || 'WARN' }})"

  # ===========================================================================
  # AZURE — Approve (mandatory gate for ALL apply and destroy)
  #
  # Fires when:
  #   • manual apply (with OR without deletions in plan)
  #   • manual destroy (any scope, any env)
  #
  # Skipped for:
  #   • scheduled runs (no human available — intentional auto-run)
  #   • plan-only runs
  #
  # Uses the "terraform-destructive-approval" environment for every apply/destroy
  # so a required reviewer MUST approve before terraform executes.
  # ===========================================================================
  azure_approve:
    name: "Approve — Azure"
    runs-on: ubuntu-latest
    needs: [setup, azure_plan]
    if: |
      always() &&
      needs.setup.outputs.scheduled == 'false' &&
      needs.setup.outputs.run_azure == 'true' &&
      (needs.azure_plan.result == 'success' || needs.azure_plan.result == 'skipped') &&
      (needs.setup.outputs.action == 'apply' || needs.setup.outputs.action == 'destroy')
    environment: terraform-destructive-approval

    steps:
      - name: Summarise what will happen
        run: |
          echo "============================================================"
          echo "  ⚠️  APPROVAL REQUIRED — Azure ${{ needs.setup.outputs.env }}"
          echo "============================================================"
          echo "  Action : ${{ needs.setup.outputs.action }}"
          echo "  Scope  : ${{ needs.setup.outputs.scope }}"
          if [ "${{ needs.setup.outputs.action }}" = "destroy" ]; then
            if [ "${{ needs.setup.outputs.scope }}" = "compute-only" ]; then
              echo ""
              echo "  Destroying: AKS, load balancer, VNet, subnets"
              echo "  Keeping:    ACR, SQL Database, Key Vault, Storage Account"
              echo "  → Compute billing stops. Data and images are preserved."
            else
              echo ""
              echo "  Destroying: ALL resources in ${{ needs.setup.outputs.env }}"
              echo "  WARNING:    SQL data, container images, and secrets will be DELETED."
            fi
          else
            DESTROY_COUNT="${{ needs.azure_plan.outputs.destroy_count }}"
            if [ -z "$DESTROY_COUNT" ] || [ "$DESTROY_COUNT" = "0" ]; then
              echo ""
              echo "  This apply has NO resource deletions."
              echo "  Approval is still required for all apply operations."
            else
              echo "  Destroys in plan: $DESTROY_COUNT resource(s)"
              echo ""
              echo "${{ needs.azure_plan.outputs.destroy_list }}"
            fi
          fi
          echo "============================================================"
          echo "  Click Approve in the GitHub Actions UI to proceed."
          echo "============================================================"

  # ===========================================================================
  # AZURE — Apply / Destroy
  #
  # Apply:   uses saved plan binary (exact approved plan)
  # Destroy: compute-only → targeted -target flags
  #          full         → terraform destroy -auto-approve
  # ===========================================================================
  azure_apply:
    name: "Azure Apply / Destroy"
    runs-on: ubuntu-latest
    needs: [setup, azure_plan, azure_approve]
    if: |
      always() &&
      needs.setup.outputs.run_azure == 'true' &&
      needs.setup.outputs.action != 'plan' &&
      (needs.azure_plan.result == 'success' || needs.azure_plan.result == 'skipped') &&
      (
        needs.azure_approve.result == 'success' ||
        needs.azure_approve.result == 'skipped'
      ) &&
      (
        needs.azure_approve.result != 'skipped' ||
        needs.setup.outputs.scheduled == 'true'
      )

    defaults:
      run:
        working-directory: infrastructure/azure/environments/${{ needs.setup.outputs.env }}

    env:
      ARM_USE_OIDC:        "true"
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_environment:                  ${{ needs.setup.outputs.env }}
      TF_VAR_github_actions_principal_id:  ${{ secrets.TF_GITHUB_ACTIONS_PRINCIPAL_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Azure OIDC login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        run: |
          # Platform KV name resolved from secret (set during bootstrap)
          KV="${{ secrets.PLATFORM_KV_NAME }}"
          DISCORD=$(az keyvault secret show --vault-name "$KV" --name "discord-webhook-url" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$DISCORD" ]]; then
            echo "::add-mask::$DISCORD"
            echo "DISCORD_WEBHOOK_URL=$DISCORD" >> "$GITHUB_ENV"
          fi

          GH_PAT=$(az keyvault secret show --vault-name "$KV" --name "github-pat" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$GH_PAT" ]]; then
            echo "::add-mask::$GH_PAT"
            echo "TF_VAR_github_token=$GH_PAT" >> "$GITHUB_ENV"
          else
            echo "::error::Failed to fetch github-pat from Key Vault $KV"
            exit 1
          fi

      - name: Terraform init
        run: |
          CONTAINER="rentalapp-${{ needs.setup.outputs.env }}-tfstate"
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=${CONTAINER}"

      - name: Download approved plan
        if: needs.setup.outputs.action == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-azure-${{ needs.setup.outputs.env }}-${{ github.run_id }}
          path: infrastructure/azure/environments/${{ needs.setup.outputs.env }}

      - name: Terraform apply
        id: apply
        if: needs.setup.outputs.action == 'apply'
        run: terraform apply -no-color tfplan.binary

      - name: Terraform destroy (compute-only)
        id: destroy_compute
        if: |
          needs.setup.outputs.action == 'destroy' &&
          needs.setup.outputs.scope == 'compute-only'
        run: |
          terraform destroy -auto-approve -no-color \
            -target=module.aks \
            -target=module.load_balancer \
            -target=module.security_group \
            -target=module.subnet \
            -target=module.vnet

      - name: Terraform destroy (full)
        id: destroy_full
        if: |
          needs.setup.outputs.action == 'destroy' &&
          needs.setup.outputs.scope == 'full'
        run: terraform destroy -auto-approve -no-color

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK: ${{ env.DISCORD_WEBHOOK_URL }}
        uses: Ilshidur/action-discord@d2594079a10f1d6739ee50a2471f0ca57418b554
        with:
          args: |
            ${{ (steps.apply.outcome == 'success' || steps.destroy_compute.outcome == 'success' || steps.destroy_full.outcome == 'success') && '✅' || '❌' }} **Azure ${{ needs.setup.outputs.env }} — ${{ needs.setup.outputs.action }}** (${{ needs.setup.outputs.scope }})
            Trigger: `${{ github.event_name }}` | Actor: `${{ github.actor }}` | Commit: `${{ github.sha }}`

      - name: Job summary
        if: always()
        run: |
          echo "### Azure ${{ needs.setup.outputs.env }} — ${{ needs.setup.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | ${{ needs.setup.outputs.scope }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.setup.outputs.action }}" = "destroy" ] && [ "${{ needs.setup.outputs.scope }}" = "compute-only" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Kept:** ACR | SQL Database | Key Vault | Storage Account" >> $GITHUB_STEP_SUMMARY
            echo "**Re-deploy:** trigger this workflow → action=apply" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # GCP — Plan
  # ===========================================================================
  gcp_plan:
    name: "GCP Plan"
    runs-on: ubuntu-latest
    needs: setup
    if: |
      needs.setup.outputs.run_gcp == 'true' &&
      needs.setup.outputs.action != 'destroy'

    outputs:
      has_destroys:  ${{ steps.check_destroys.outputs.has_destroys }}
      destroy_count: ${{ steps.check_destroys.outputs.destroy_count }}
      destroy_list:  ${{ steps.check_destroys.outputs.destroy_list }}

    defaults:
      run:
        working-directory: infrastructure/gcp/environments/${{ needs.setup.outputs.env }}

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: GCP OIDC login
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: set -o pipefail; terraform plan -out=tfplan.binary -no-color 2>&1 | tee plan.txt

      - name: Convert plan to JSON
        run: terraform show -json tfplan.binary > tfplan.json

      # ── OPA cost check (terraform plan JSON — no external API needed) ────────
      - name: Install conftest
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/

      - name: OPA cost check
        id: opa_cost
        run: |
          set +e

          echo "==== OPA Cost Check Terminal Output ===="
          conftest test tfplan.json \
            --namespace cost_tfplan \
            --policy ../../../../platform/security/policies/cost/tf_plan_cost.rego

          conftest test tfplan.json \
            --namespace cost_tfplan \
            --policy ../../../../platform/security/policies/cost/tf_plan_cost.rego \
            --output json > opa-cost-result.json 2>&1
          OPA_EXIT=$?
          echo "exit_code=${OPA_EXIT}" >> "$GITHUB_OUTPUT"

          echo "### OPA Cost Check" >> "$GITHUB_STEP_SUMMARY"
          echo "Budget: \$22/month | Pattern: deploy-destroy (88 hrs/month)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          python3 - >> "$GITHUB_STEP_SUMMARY" <<'PYEOF'
          import json
          try:
              data = json.load(open("opa-cost-result.json"))
          except Exception:
              print("_No result data_"); exit(0)
          failures = [f for r in data for f in r.get("failures", [])]
          warnings = [w for r in data for w in r.get("warnings", [])]
          if failures:
              print("**DENY**"); [print(f"> {f['msg']}") for f in failures]
          if warnings:
              print("**WARN**"); [print(f"> {w['msg']}") for w in warnings]
          if not failures and not warnings:
              print("Cost within budget.")
          PYEOF
          set -e

      - name: Detect destructive changes
        id: check_destroys
        run: |
          DESTROY_COUNT=$(jq '[.resource_changes[] | select(.change.actions | contains(["delete"]))] | length' tfplan.json)
          DESTROY_LIST=$(jq -r '
            [.resource_changes[] | select(.change.actions | contains(["delete"]))]
            | .[]
            | "  - \(.address)  [\(.change.actions | join(" + "))]"
          ' tfplan.json)

          echo "destroy_count=$DESTROY_COUNT" >> $GITHUB_OUTPUT

          if [ "$DESTROY_COUNT" -gt 0 ]; then
            echo "has_destroys=true" >> $GITHUB_OUTPUT
            {
              echo "destroy_list<<DESTROY_EOF"
              echo "$DESTROY_LIST"
              echo "DESTROY_EOF"
            } >> $GITHUB_OUTPUT
            echo "::warning::⚠️ $DESTROY_COUNT resource(s) will be DESTROYED — manual approval required"
            echo "$DESTROY_LIST"
          else
            echo "has_destroys=false" >> $GITHUB_OUTPUT
            echo "destroy_list=none"  >> $GITHUB_OUTPUT
          fi

      - name: Upload plan artifact
        if: needs.setup.outputs.action == 'apply' && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-gcp-${{ needs.setup.outputs.env }}-${{ github.run_id }}
          path: infrastructure/gcp/environments/${{ needs.setup.outputs.env }}/tfplan.binary
          retention-days: 1

      - name: Job summary
        if: always()
        run: |
          echo "### GCP ${{ needs.setup.outputs.env }} — Plan" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Destroys | ${{ steps.check_destroys.outputs.destroy_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "GCP ${{ needs.setup.outputs.env }} — Plan (OPA: ${{ steps.opa_cost.outputs.exit_code == '0' && 'OK' || 'WARN' }})"

  # ===========================================================================
  # GCP — Approve (mandatory gate for ALL apply and destroy)
  #
  # Fires when:
  #   • manual apply (with OR without deletions in plan)
  #   • manual destroy (any scope, any env)
  #
  # Skipped for:
  #   • scheduled runs (no human available — intentional auto-run)
  #   • plan-only runs
  # ===========================================================================
  gcp_approve:
    name: "Approve — GCP"
    runs-on: ubuntu-latest
    needs: [setup, gcp_plan]
    if: |
      always() &&
      needs.setup.outputs.scheduled == 'false' &&
      needs.setup.outputs.run_gcp == 'true' &&
      (needs.gcp_plan.result == 'success' || needs.gcp_plan.result == 'skipped') &&
      (needs.setup.outputs.action == 'apply' || needs.setup.outputs.action == 'destroy')
    environment: terraform-destructive-approval

    steps:
      - name: Summarise what will happen
        run: |
          echo "============================================================"
          echo "  ⚠️  APPROVAL REQUIRED — GCP ${{ needs.setup.outputs.env }}"
          echo "============================================================"
          echo "  Action : ${{ needs.setup.outputs.action }}"
          echo "  Scope  : ${{ needs.setup.outputs.scope }}"
          if [ "${{ needs.setup.outputs.action }}" = "destroy" ]; then
            if [ "${{ needs.setup.outputs.scope }}" = "compute-only" ]; then
              echo ""
              echo "  Destroying: GKE cluster, Cloud NAT, VPC, subnets"
              echo "  Keeping:    Artifact Registry, Cloud SQL, Secret Manager"
              echo "  → Compute billing stops. Data and images are preserved."
            else
              echo ""
              echo "  Destroying: ALL GCP resources in ${{ needs.setup.outputs.env }}"
              echo "  WARNING:    Cloud SQL data and container images will be DELETED."
            fi
          else
            DESTROY_COUNT="${{ needs.gcp_plan.outputs.destroy_count }}"
            if [ -z "$DESTROY_COUNT" ] || [ "$DESTROY_COUNT" = "0" ]; then
              echo ""
              echo "  This apply has NO resource deletions."
              echo "  Approval is still required for all apply operations."
            else
              echo "  Destroys in plan: $DESTROY_COUNT resource(s)"
              echo ""
              echo "${{ needs.gcp_plan.outputs.destroy_list }}"
            fi
          fi
          echo "============================================================"
          echo "  Click Approve in the GitHub Actions UI to proceed."
          echo "============================================================"

  # ===========================================================================
  # GCP — Apply / Destroy
  # ===========================================================================
  gcp_apply:
    name: "GCP Apply / Destroy"
    runs-on: ubuntu-latest
    needs: [setup, gcp_plan, gcp_approve]
    if: |
      always() &&
      needs.setup.outputs.run_gcp == 'true' &&
      needs.setup.outputs.action != 'plan' &&
      (needs.gcp_plan.result == 'success' || needs.gcp_plan.result == 'skipped') &&
      (
        needs.gcp_approve.result == 'success' ||
        needs.gcp_approve.result == 'skipped'
      ) &&
      (
        needs.gcp_approve.result != 'skipped' ||
        needs.setup.outputs.scheduled == 'true'
      )

    defaults:
      run:
        working-directory: infrastructure/gcp/environments/${{ needs.setup.outputs.env }}

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: GCP OIDC login
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform init
        run: terraform init

      - name: Download approved plan
        if: needs.setup.outputs.action == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-gcp-${{ needs.setup.outputs.env }}-${{ github.run_id }}
          path: infrastructure/gcp/environments/${{ needs.setup.outputs.env }}

      - name: Terraform apply
        id: apply
        if: needs.setup.outputs.action == 'apply'
        run: terraform apply -no-color tfplan.binary

      - name: Terraform destroy (compute-only)
        id: destroy_compute
        if: |
          needs.setup.outputs.action == 'destroy' &&
          needs.setup.outputs.scope == 'compute-only'
        run: |
          terraform destroy -auto-approve -no-color \
            -target=module.gke \
            -target=module.nat \
            -target=module.vpc

      - name: Terraform destroy (full)
        id: destroy_full
        if: |
          needs.setup.outputs.action == 'destroy' &&
          needs.setup.outputs.scope == 'full'
        run: terraform destroy -auto-approve -no-color

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK: ${{ env.DISCORD_WEBHOOK_URL }}
        uses: Ilshidur/action-discord@d2594079a10f1d6739ee50a2471f0ca57418b554
        with:
          args: |
            ${{ (steps.apply.outcome == 'success' || steps.destroy_compute.outcome == 'success' || steps.destroy_full.outcome == 'success') && '✅' || '❌' }} **GCP ${{ needs.setup.outputs.env }} — ${{ needs.setup.outputs.action }}** (${{ needs.setup.outputs.scope }})
            Trigger: `${{ github.event_name }}` | Actor: `${{ github.actor }}` | Commit: `${{ github.sha }}`

      - name: Job summary
        if: always()
        run: |
          echo "### GCP ${{ needs.setup.outputs.env }} — ${{ needs.setup.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | ${{ needs.setup.outputs.scope }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.setup.outputs.action }}" = "destroy" ] && [ "${{ needs.setup.outputs.scope }}" = "compute-only" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Kept:** Artifact Registry | Cloud SQL | Secret Manager" >> $GITHUB_STEP_SUMMARY
            echo "**Re-deploy:** trigger this workflow → action=apply" >> $GITHUB_STEP_SUMMARY
          fi
