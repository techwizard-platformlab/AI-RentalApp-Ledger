name: "Terraform"

# ─────────────────────────────────────────────────────────────────────────────
# Single workflow for ALL environments and ALL actions.
#
#   pull_request  → plan only, env=dev  (automatic)
#   push to main  → apply,     env=dev  (automatic)
#   workflow_dispatch → user chooses: target_env / cloud / action
#
# Auth: Azure client-secret (OIDC skipped — KodeKloud lab environment subjects
#       are not registered as federated credentials)
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "policy/**"
      - ".github/workflows/terraform.yml"

  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa, uat, prod]

      cloud:
        description: "Target cloud"
        required: true
        default: "azure"
        type: choice
        options: [azure, gcp, both]

      action:
        description: "Action to run"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

      confirm:
        description: "For apply/destroy in qa/uat/prod: type the environment name"
        required: false
        default: ""
        type: string

concurrency:
  group: terraform-${{ github.event.inputs.target_env || 'dev' }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.5.7"

# ─────────────────────────────────────────────────────────────────────────────
# JOB: setup
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  setup:
    name: "Resolve inputs"
    runs-on: ubuntu-latest
    outputs:
      env:       ${{ steps.resolve.outputs.env }}
      action:    ${{ steps.resolve.outputs.action }}
      run_azure: ${{ steps.resolve.outputs.run_azure }}
      run_gcp:   ${{ steps.resolve.outputs.run_gcp }}

    steps:
      - name: Resolve trigger inputs
        id: resolve
        run: |
          TRIGGER="${{ github.event_name }}"

          if [ "$TRIGGER" = "pull_request" ]; then
            echo "env=dev"        >> $GITHUB_OUTPUT
            echo "action=plan"   >> $GITHUB_OUTPUT
            echo "run_azure=true" >> $GITHUB_OUTPUT
            echo "run_gcp=false"  >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$TRIGGER" = "push" ]; then
            BRANCH="${{ github.ref_name }}"
            # Feature/fix branches → plan only; main → apply
            if [ "$BRANCH" = "main" ]; then
              echo "action=apply" >> $GITHUB_OUTPUT
            else
              echo "action=plan"  >> $GITHUB_OUTPUT
            fi
            echo "env=dev"        >> $GITHUB_OUTPUT
            echo "run_azure=true" >> $GITHUB_OUTPUT
            echo "run_gcp=false"  >> $GITHUB_OUTPUT
            exit 0
          fi

          ENV="${{ github.event.inputs.target_env }}"
          ACTION="${{ github.event.inputs.action }}"
          CLOUD="${{ github.event.inputs.cloud }}"
          CONFIRM="${{ github.event.inputs.confirm }}"

          # Safety check for non-dev apply/destroy
          if [ "$ACTION" != "plan" ] && [ "$ENV" != "dev" ]; then
            if [ "$CONFIRM" != "$ENV" ]; then
              echo "ERROR: For $ACTION on $ENV, type the environment name in the confirm field."
              exit 1
            fi
          fi

          echo "env=$ENV"     >> $GITHUB_OUTPUT
          echo "action=$ACTION" >> $GITHUB_OUTPUT

          if [ "$CLOUD" = "azure" ] || [ "$CLOUD" = "both" ]; then
            echo "run_azure=true" >> $GITHUB_OUTPUT
          else
            echo "run_azure=false" >> $GITHUB_OUTPUT
          fi

          if [ "$CLOUD" = "gcp" ] || [ "$CLOUD" = "both" ]; then
            echo "run_gcp=true" >> $GITHUB_OUTPUT
          else
            echo "run_gcp=false" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB: azure
  # ─────────────────────────────────────────────────────────────────────────────
  azure:
    name: "Azure / ${{ needs.setup.outputs.env }} / ${{ needs.setup.outputs.action }}"
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_azure == 'true'

    defaults:
      run:
        working-directory: terraform/azure/environments/${{ needs.setup.outputs.env }}

    env:
      # Client-secret auth (ARM provider)
      ARM_USE_OIDC:        "false"
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_resource_group_name: ${{ secrets.TF_BACKEND_RG }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          client-secret:   ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      - name: Terraform init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}"

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        if: needs.setup.outputs.action != 'destroy'
        run: terraform plan -out=tfplan.binary -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Convert plan to JSON (OPA input)
        if: needs.setup.outputs.action != 'destroy'
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Install conftest
        if: needs.setup.outputs.action != 'destroy'
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/

      - name: OPA policy check
        id: opa
        if: needs.setup.outputs.action != 'destroy'
        run: |
          conftest test tfplan.json \
            --policy ../../../../policy/terraform/azure.rego \
            --output json | tee opa-results.json
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.existsSync('terraform/azure/environments/${{ needs.setup.outputs.env }}/plan.txt')
              ? fs.readFileSync('terraform/azure/environments/${{ needs.setup.outputs.env }}/plan.txt', 'utf8').slice(-60000)
              : 'Plan unavailable';
            const icon = s => s === 'success' ? 'OK' : s === 'failure' ? 'FAIL' : 'SKIP';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Azure \`${{ needs.setup.outputs.env }}\` Terraform Plan\n| Step | Status |\n|------|--------|\n| fmt | ${icon('${{ steps.fmt.outcome }}')} |\n| init | ${icon('${{ steps.init.outcome }}')} |\n| validate | ${icon('${{ steps.validate.outcome }}')} |\n| plan | ${icon('${{ steps.plan.outcome }}')} |\n| opa | ${icon('${{ steps.opa.outcome }}')} |\n\`\`\`hcl\n${plan}\n\`\`\``
            });

      - name: Terraform apply
        id: apply
        if: needs.setup.outputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Terraform destroy
        id: destroy
        if: needs.setup.outputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Job summary
        if: always()
        run: |
          echo "### Azure ${{ needs.setup.outputs.env }} - ${{ needs.setup.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB: gcp
  # ─────────────────────────────────────────────────────────────────────────────
  gcp:
    name: "GCP / ${{ needs.setup.outputs.env }} / ${{ needs.setup.outputs.action }}"
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_gcp == 'true'

    defaults:
      run:
        working-directory: terraform/gcp/environments/${{ needs.setup.outputs.env }}

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: GCP OIDC login
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        if: needs.setup.outputs.action != 'destroy'
        run: terraform plan -out=tfplan.binary -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Convert plan to JSON (OPA input)
        if: needs.setup.outputs.action != 'destroy'
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Install conftest
        if: needs.setup.outputs.action != 'destroy'
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/

      - name: OPA policy check
        id: opa
        if: needs.setup.outputs.action != 'destroy'
        run: |
          conftest test tfplan.json \
            --policy ../../../../policy/terraform/gcp.rego \
            --output json | tee opa-results.json
        continue-on-error: true

      - name: Terraform apply
        id: apply
        if: needs.setup.outputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Terraform destroy
        id: destroy
        if: needs.setup.outputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Job summary
        if: always()
        run: |
          echo "### GCP ${{ needs.setup.outputs.env }} - ${{ needs.setup.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
