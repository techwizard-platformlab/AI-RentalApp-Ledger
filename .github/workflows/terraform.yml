name: "Terraform"

# =============================================================================
# Single workflow for ALL environments and ALL actions.
#
#   pull_request  → plan only, env=dev  (automatic)
#   push to main  → apply,     env=dev  (automatic)
#   workflow_dispatch → user chooses: target_env / cloud / action
#
# Destruction guard
#   If the plan contains any resource deletions (or action=destroy), the
#   pipeline pauses at the "approve" job and waits for a human to click
#   "Approve" in the GitHub Actions UI before apply/destroy runs.
#   Setup: repo Settings → Environments → create "terraform-destructive-approval"
#          → add yourself as a required reviewer.
#
# Auth: Azure client-secret (OIDC skipped — KodeKloud SP is not registered
#       as a federated credential)
# =============================================================================

on:
  # Auto triggers disabled during testing — enable after workflow is stable
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "terraform/**"
  #     - "policy/**"
  #     - ".github/workflows/terraform.yml"

  # push:
  #   branches:
  #     - main
  #     - "feature/**"
  #     - "fix/**"
  #     - "hotfix/**"
  #   paths:
  #     - "terraform/**"
  #     - ".github/workflows/terraform.yml"

  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa, uat, prod]

      cloud:
        description: "Target cloud"
        required: true
        default: "azure"
        type: choice
        options: [azure, gcp, both]

      action:
        description: "Action to run"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

      confirm:
        description: "For apply/destroy in qa/uat/prod: type the environment name"
        required: false
        default: ""
        type: string

concurrency:
  group: terraform-${{ github.event.inputs.target_env || 'dev' }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.5.7"

jobs:

  # ===========================================================================
  # JOB: setup — resolve trigger inputs into shared outputs
  # ===========================================================================
  setup:
    name: "Resolve inputs"
    runs-on: ubuntu-latest
    outputs:
      env:       ${{ steps.resolve.outputs.env }}
      action:    ${{ steps.resolve.outputs.action }}
      run_azure: ${{ steps.resolve.outputs.run_azure }}
      run_gcp:   ${{ steps.resolve.outputs.run_gcp }}

    steps:
      - name: Resolve trigger inputs
        id: resolve
        run: |
          TRIGGER="${{ github.event_name }}"

          if [ "$TRIGGER" = "pull_request" ]; then
            echo "env=dev"         >> $GITHUB_OUTPUT
            echo "action=plan"     >> $GITHUB_OUTPUT
            echo "run_azure=true"  >> $GITHUB_OUTPUT
            echo "run_gcp=false"   >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$TRIGGER" = "push" ]; then
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "main" ]; then
              echo "action=apply"  >> $GITHUB_OUTPUT
            else
              echo "action=plan"   >> $GITHUB_OUTPUT
            fi
            echo "env=dev"         >> $GITHUB_OUTPUT
            echo "run_azure=true"  >> $GITHUB_OUTPUT
            echo "run_gcp=false"   >> $GITHUB_OUTPUT
            exit 0
          fi

          ENV="${{ github.event.inputs.target_env }}"
          ACTION="${{ github.event.inputs.action }}"
          CLOUD="${{ github.event.inputs.cloud }}"
          CONFIRM="${{ github.event.inputs.confirm }}"

          # Safety check for non-dev apply/destroy
          if [ "$ACTION" != "plan" ] && [ "$ENV" != "dev" ]; then
            if [ "$CONFIRM" != "$ENV" ]; then
              echo "ERROR: For $ACTION on $ENV, type the environment name in the confirm field."
              exit 1
            fi
          fi

          echo "env=$ENV"       >> $GITHUB_OUTPUT
          echo "action=$ACTION" >> $GITHUB_OUTPUT

          if [ "$CLOUD" = "azure" ] || [ "$CLOUD" = "both" ]; then
            echo "run_azure=true"  >> $GITHUB_OUTPUT
          else
            echo "run_azure=false" >> $GITHUB_OUTPUT
          fi

          if [ "$CLOUD" = "gcp" ] || [ "$CLOUD" = "both" ]; then
            echo "run_gcp=true"  >> $GITHUB_OUTPUT
          else
            echo "run_gcp=false" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # AZURE — Plan
  # Runs terraform plan, detects destroys, uploads plan binary as artifact.
  # ===========================================================================
  azure_plan:
    name: "Azure Plan / ${{ needs.setup.outputs.env }}"
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_azure == 'true'

    outputs:
      has_destroys:  ${{ steps.check_destroys.outputs.has_destroys }}
      destroy_count: ${{ steps.check_destroys.outputs.destroy_count }}
      destroy_list:  ${{ steps.check_destroys.outputs.destroy_list }}

    defaults:
      run:
        working-directory: terraform/azure/environments/${{ needs.setup.outputs.env }}

    env:
      ARM_USE_OIDC:        "false"
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_resource_group_name: ${{ secrets.TF_BACKEND_RG }}
      TF_VAR_subscription_id:    ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_cicd_sp_object_id:  ${{ secrets.AZURE_SP_OBJECT_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      # ARM_* vars authenticate the Terraform provider (Go SDK) but NOT the az CLI.
      # azure/login@v2 defaults to OIDC which KodeKloud doesn't support — use direct az login.
      - name: Azure CLI login
        run: |
          az login --service-principal \
            --username "$ARM_CLIENT_ID" \
            --password "$ARM_CLIENT_SECRET" \
            --tenant  "$ARM_TENANT_ID" \
            --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      - name: Terraform init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}"

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        if: needs.setup.outputs.action != 'destroy'
        run: terraform plan -out=tfplan.binary -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Convert plan to JSON
        if: needs.setup.outputs.action != 'destroy'
        run: terraform show -json tfplan.binary > tfplan.json

      # Detect any delete or replace (delete+create) operations in the plan.
      # Contains(["delete"]) matches both pure deletes and delete+create replacements.
      - name: Detect destructive changes
        id: check_destroys
        if: needs.setup.outputs.action != 'destroy'
        run: |
          DESTROY_COUNT=$(jq '[.resource_changes[] | select(.change.actions | contains(["delete"]))] | length' tfplan.json)
          DESTROY_LIST=$(jq -r '
            [.resource_changes[] | select(.change.actions | contains(["delete"]))]
            | .[]
            | "  - \(.address)  [\(.change.actions | join(" + "))]"
          ' tfplan.json)

          echo "destroy_count=$DESTROY_COUNT" >> $GITHUB_OUTPUT

          if [ "$DESTROY_COUNT" -gt 0 ]; then
            echo "has_destroys=true" >> $GITHUB_OUTPUT
            {
              echo "destroy_list<<DESTROY_EOF"
              echo "$DESTROY_LIST"
              echo "DESTROY_EOF"
            } >> $GITHUB_OUTPUT
            echo "::warning::⚠️ $DESTROY_COUNT resource(s) will be DESTROYED — manual approval required"
            echo "$DESTROY_LIST"
          else
            echo "has_destroys=false" >> $GITHUB_OUTPUT
            echo "destroy_list=none"  >> $GITHUB_OUTPUT
          fi

      - name: Install conftest
        if: needs.setup.outputs.action != 'destroy'
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/

      - name: OPA policy check
        id: opa
        if: needs.setup.outputs.action != 'destroy'
        run: |
          conftest test tfplan.json \
            --policy ../../../../policy/terraform/azure.rego \
            --output json | tee opa-results.json
        continue-on-error: true

      # Upload plan binary so azure_apply can apply the EXACT approved plan.
      - name: Upload plan artifact
        if: needs.setup.outputs.action == 'apply' && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-azure-${{ needs.setup.outputs.env }}-${{ github.run_id }}
          path: terraform/azure/environments/${{ needs.setup.outputs.env }}/tfplan.binary
          retention-days: 1

      - name: Post plan as PR comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.existsSync('terraform/azure/environments/${{ needs.setup.outputs.env }}/plan.txt')
              ? fs.readFileSync('terraform/azure/environments/${{ needs.setup.outputs.env }}/plan.txt', 'utf8').slice(-60000)
              : 'Plan unavailable';
            const icon = s => s === 'success' ? 'OK' : s === 'failure' ? 'FAIL' : 'SKIP';
            const hasDestroys = '${{ steps.check_destroys.outputs.has_destroys }}' === 'true';
            const destroyBadge = hasDestroys
              ? '\n> ⚠️ **${{ steps.check_destroys.outputs.destroy_count }} resource(s) will be DESTROYED — manual approval required before apply**\n'
              : '';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Azure \`${{ needs.setup.outputs.env }}\` Terraform Plan\n${destroyBadge}\n| Step | Status |\n|------|--------|\n| fmt | ${icon('${{ steps.fmt.outcome }}')} |\n| init | ${icon('${{ steps.init.outcome }}')} |\n| validate | ${icon('${{ steps.validate.outcome }}')} |\n| plan | ${icon('${{ steps.plan.outcome }}')} |\n| opa | ${icon('${{ steps.opa.outcome }}')} |\n\`\`\`hcl\n${plan}\n\`\`\``
            });

      - name: Job summary
        if: always()
        run: |
          echo "### Azure ${{ needs.setup.outputs.env }} — Plan" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Destroys | ${{ steps.check_destroys.outputs.destroy_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # AZURE — Approve (destruction gate)
  #
  # Triggered when:
  #   • action=apply  AND the plan contains at least one resource deletion/replace
  #   • action=destroy (always — the entire environment will be torn down)
  #
  # The "terraform-destructive-approval" GitHub Environment must have required
  # reviewers configured: repo Settings → Environments → Add reviewer.
  # The pipeline pauses here until a reviewer clicks "Approve" in the UI.
  # ===========================================================================
  azure_approve:
    name: "⚠️ Approve destructive changes — Azure ${{ needs.setup.outputs.env }}"
    runs-on: ubuntu-latest
    needs: [setup, azure_plan]
    if: |
      needs.setup.outputs.run_azure == 'true' &&
      needs.azure_plan.result == 'success' &&
      (
        needs.setup.outputs.action == 'destroy' ||
        (needs.setup.outputs.action == 'apply' && needs.azure_plan.outputs.has_destroys == 'true')
      )
    environment: terraform-destructive-approval

    steps:
      - name: Summarise what will be destroyed
        run: |
          echo "============================================================"
          echo "  ⚠️  DESTRUCTIVE TERRAFORM CHANGES — Azure ${{ needs.setup.outputs.env }}"
          echo "============================================================"
          if [ "${{ needs.setup.outputs.action }}" = "destroy" ]; then
            echo "  Action : DESTROY"
            echo "  Impact : The ENTIRE ${{ needs.setup.outputs.env }} environment will be torn down."
          else
            echo "  Action  : apply"
            echo "  Destroys: ${{ needs.azure_plan.outputs.destroy_count }} resource(s)"
            echo ""
            echo "${{ needs.azure_plan.outputs.destroy_list }}"
          fi
          echo "============================================================"
          echo "  Approve this step in the GitHub Actions UI to proceed."
          echo "============================================================"

  # ===========================================================================
  # AZURE — Apply / Destroy
  #
  # Runs after azure_approve succeeds (or is skipped when no destroys).
  # Apply uses the saved plan binary — what was reviewed is exactly what runs.
  # ===========================================================================
  azure_apply:
    name: "Azure ${{ needs.setup.outputs.action == 'destroy' && 'Destroy' || 'Apply' }} / ${{ needs.setup.outputs.env }}"
    runs-on: ubuntu-latest
    needs: [setup, azure_plan, azure_approve]
    if: |
      always() &&
      needs.setup.outputs.run_azure == 'true' &&
      needs.setup.outputs.action != 'plan' &&
      needs.azure_plan.result == 'success' &&
      (needs.azure_approve.result == 'success' || needs.azure_approve.result == 'skipped')

    defaults:
      run:
        working-directory: terraform/azure/environments/${{ needs.setup.outputs.env }}

    env:
      ARM_USE_OIDC:        "false"
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_resource_group_name: ${{ secrets.TF_BACKEND_RG }}
      TF_VAR_subscription_id:    ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_cicd_sp_object_id:  ${{ secrets.AZURE_SP_OBJECT_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Azure CLI login
        run: |
          az login --service-principal \
            --username "$ARM_CLIENT_ID" \
            --password "$ARM_CLIENT_SECRET" \
            --tenant  "$ARM_TENANT_ID" \
            --output none
          az account set --subscription "$ARM_SUBSCRIPTION_ID"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}"

      # Download the plan approved in azure_plan so apply runs the exact same changes.
      - name: Download approved plan
        if: needs.setup.outputs.action == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-azure-${{ needs.setup.outputs.env }}-${{ github.run_id }}
          path: terraform/azure/environments/${{ needs.setup.outputs.env }}

      - name: Terraform apply
        if: needs.setup.outputs.action == 'apply'
        run: terraform apply -no-color tfplan.binary

      - name: Terraform destroy
        if: needs.setup.outputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Job summary
        if: always()
        run: |
          echo "### Azure ${{ needs.setup.outputs.env }} — ${{ needs.setup.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # GCP — Plan
  # ===========================================================================
  gcp_plan:
    name: "GCP Plan / ${{ needs.setup.outputs.env }}"
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_gcp == 'true'

    outputs:
      has_destroys:  ${{ steps.check_destroys.outputs.has_destroys }}
      destroy_count: ${{ steps.check_destroys.outputs.destroy_count }}
      destroy_list:  ${{ steps.check_destroys.outputs.destroy_list }}

    defaults:
      run:
        working-directory: terraform/gcp/environments/${{ needs.setup.outputs.env }}

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: GCP OIDC login
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive ../../..
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        if: needs.setup.outputs.action != 'destroy'
        run: terraform plan -out=tfplan.binary -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Convert plan to JSON
        if: needs.setup.outputs.action != 'destroy'
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Detect destructive changes
        id: check_destroys
        if: needs.setup.outputs.action != 'destroy'
        run: |
          DESTROY_COUNT=$(jq '[.resource_changes[] | select(.change.actions | contains(["delete"]))] | length' tfplan.json)
          DESTROY_LIST=$(jq -r '
            [.resource_changes[] | select(.change.actions | contains(["delete"]))]
            | .[]
            | "  - \(.address)  [\(.change.actions | join(" + "))]"
          ' tfplan.json)

          echo "destroy_count=$DESTROY_COUNT" >> $GITHUB_OUTPUT

          if [ "$DESTROY_COUNT" -gt 0 ]; then
            echo "has_destroys=true" >> $GITHUB_OUTPUT
            {
              echo "destroy_list<<DESTROY_EOF"
              echo "$DESTROY_LIST"
              echo "DESTROY_EOF"
            } >> $GITHUB_OUTPUT
            echo "::warning::⚠️ $DESTROY_COUNT resource(s) will be DESTROYED — manual approval required"
            echo "$DESTROY_LIST"
          else
            echo "has_destroys=false" >> $GITHUB_OUTPUT
            echo "destroy_list=none"  >> $GITHUB_OUTPUT
          fi

      - name: Install conftest
        if: needs.setup.outputs.action != 'destroy'
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin/

      - name: OPA policy check
        id: opa
        if: needs.setup.outputs.action != 'destroy'
        run: |
          conftest test tfplan.json \
            --policy ../../../../policy/terraform/gcp.rego \
            --output json | tee opa-results.json
        continue-on-error: true

      - name: Upload plan artifact
        if: needs.setup.outputs.action == 'apply' && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-gcp-${{ needs.setup.outputs.env }}-${{ github.run_id }}
          path: terraform/gcp/environments/${{ needs.setup.outputs.env }}/tfplan.binary
          retention-days: 1

      - name: Job summary
        if: always()
        run: |
          echo "### GCP ${{ needs.setup.outputs.env }} — Plan" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Destroys | ${{ steps.check_destroys.outputs.destroy_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # GCP — Approve (destruction gate)
  # Same logic as azure_approve — uses the same shared environment.
  # ===========================================================================
  gcp_approve:
    name: "⚠️ Approve destructive changes — GCP ${{ needs.setup.outputs.env }}"
    runs-on: ubuntu-latest
    needs: [setup, gcp_plan]
    if: |
      needs.setup.outputs.run_gcp == 'true' &&
      needs.gcp_plan.result == 'success' &&
      (
        needs.setup.outputs.action == 'destroy' ||
        (needs.setup.outputs.action == 'apply' && needs.gcp_plan.outputs.has_destroys == 'true')
      )
    environment: terraform-destructive-approval

    steps:
      - name: Summarise what will be destroyed
        run: |
          echo "============================================================"
          echo "  ⚠️  DESTRUCTIVE TERRAFORM CHANGES — GCP ${{ needs.setup.outputs.env }}"
          echo "============================================================"
          if [ "${{ needs.setup.outputs.action }}" = "destroy" ]; then
            echo "  Action : DESTROY"
            echo "  Impact : The ENTIRE ${{ needs.setup.outputs.env }} environment will be torn down."
          else
            echo "  Action  : apply"
            echo "  Destroys: ${{ needs.gcp_plan.outputs.destroy_count }} resource(s)"
            echo ""
            echo "${{ needs.gcp_plan.outputs.destroy_list }}"
          fi
          echo "============================================================"
          echo "  Approve this step in the GitHub Actions UI to proceed."
          echo "============================================================"

  # ===========================================================================
  # GCP — Apply / Destroy
  # ===========================================================================
  gcp_apply:
    name: "GCP ${{ needs.setup.outputs.action == 'destroy' && 'Destroy' || 'Apply' }} / ${{ needs.setup.outputs.env }}"
    runs-on: ubuntu-latest
    needs: [setup, gcp_plan, gcp_approve]
    if: |
      always() &&
      needs.setup.outputs.run_gcp == 'true' &&
      needs.setup.outputs.action != 'plan' &&
      needs.gcp_plan.result == 'success' &&
      (needs.gcp_approve.result == 'success' || needs.gcp_approve.result == 'skipped')

    defaults:
      run:
        working-directory: terraform/gcp/environments/${{ needs.setup.outputs.env }}

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: GCP OIDC login
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform init
        run: terraform init

      - name: Download approved plan
        if: needs.setup.outputs.action == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-gcp-${{ needs.setup.outputs.env }}-${{ github.run_id }}
          path: terraform/gcp/environments/${{ needs.setup.outputs.env }}

      - name: Terraform apply
        if: needs.setup.outputs.action == 'apply'
        run: terraform apply -no-color tfplan.binary

      - name: Terraform destroy
        if: needs.setup.outputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Job summary
        if: always()
        run: |
          echo "### GCP ${{ needs.setup.outputs.env }} — ${{ needs.setup.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Env | ${{ needs.setup.outputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ needs.setup.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
