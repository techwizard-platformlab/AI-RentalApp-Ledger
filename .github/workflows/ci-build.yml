name: CI - Build, Test, Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write          # OIDC for ACR + GCR
  security-events: write   # Upload SARIF to GitHub Security tab
  pull-requests: write     # Post PR comments

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: rental-app-ledger
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Unit Tests
  # ─────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Security Scan (parallel with lint-and-test)
  # ─────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1        # Fail build on CRITICAL CVEs
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()          # Upload even if scan fails
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Build & Push (needs both jobs above)
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      # ── Compute image tags ──────────────────────────────────────────────
      - name: Compute image tags
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA::8}"
          BRANCH="${GITHUB_REF_NAME//\//-}"   # replace / with - for branch names
          DATE="$(date -u +%Y%m%d)"
          echo "sha_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "branch_date_tag=${BRANCH}-${DATE}" >> "$GITHUB_OUTPUT"

      # ── Azure OIDC login ────────────────────────────────────────────────
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # ── GCP OIDC login ──────────────────────────────────────────────────
      - name: GCP login (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── Install cosign for keyless image signing ────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # ── Docker Buildx setup ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push to Azure ACR ───────────────────────────────────────
      - name: Build & Push to ACR
        id: build_acr
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.branch_date_tag }}
          cache-from: type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # ── Build & Push to GCP Artifact Registry ──────────────────────────
      - name: Build & Push to GCP Artifact Registry
        id: build_gcr
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rental-app/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rental-app/${{ env.IMAGE_NAME }}:latest
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rental-app/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.branch_date_tag }}

      # ── Sign images with cosign (keyless) ──────────────────────────────
      - name: Sign ACR image (keyless cosign)
        run: |
          cosign sign --yes \
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}@${{ steps.build_acr.outputs.digest }}

      - name: Sign GCP image (keyless cosign)
        run: |
          cosign sign --yes \
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rental-app/${{ env.IMAGE_NAME }}@${{ steps.build_gcr.outputs.digest }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Notify
  # ─────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always()
    steps:
      - name: Discord - Success
        if: needs.build-and-push.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          title: "CI Build Succeeded"
          description: |
            **Repo:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Image tag:** `${{ needs.build-and-push.outputs.image_tag }}`
            **Pushed to:** ACR + GCP Artifact Registry
          color: 0x00ff00

      - name: Discord - Failure
        if: needs.build-and-push.result != 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          title: "CI Build FAILED"
          description: |
            **Repo:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
          color: 0xff0000

      # Email notification on failure (using SendGrid or similar action)
      - name: Email - Failure
        if: needs.build-and-push.result != 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[FAILED] CI Build - ${{ github.repository }} @ ${{ github.ref_name }}"
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions <noreply@github.com>
          body: |
            CI build failed for ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
