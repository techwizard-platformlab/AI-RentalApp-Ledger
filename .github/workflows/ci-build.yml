name: CI - Platform Validation

# Validates Terraform configs, OPA Rego policies, and K8s manifests.
# Application code lives in the RentalApp repo — its CI handles Docker build & push.

on:
  # Auto triggers disabled during testing — enable after workflow is stable
  # push:
  #   branches: [main]
  #   paths:
  #     - "terraform/**"
  #     - "policy/**"
  #     - "k8s/**"
  #     - "gitops/**"
  # pull_request:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Upload SARIF to GitHub Security tab

concurrency:
  group: ci-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Terraform format + validate
  # ─────────────────────────────────────────────────────────────────────────
  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform fmt check (Azure)
        run: terraform fmt -check -recursive terraform/azure
        continue-on-error: true

      - name: Terraform fmt check (GCP)
        run: terraform fmt -check -recursive terraform/gcp
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: OPA Rego policy lint
  # ─────────────────────────────────────────────────────────────────────────
  opa-lint:
    name: OPA Rego Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Check OPA version
        run: opa version

      - name: Lint Azure policy
        run: opa check policy/terraform/azure.rego

      - name: Lint GCP policy
        run: opa check policy/terraform/gcp.rego

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: K8s manifest validation (kubeval / kubeconform)
  # ─────────────────────────────────────────────────────────────────────────
  k8s-validate:
    name: K8s Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate k8s base manifests
        run: |
          kubeconform \
            -kubernetes-version 1.29.0 \
            -skip HorizontalPodAutoscaler \
            -ignore-missing-schemas \
            -summary \
            k8s/base/**/*.yaml

      - name: Validate ArgoCD gitops manifests
        run: |
          kubeconform \
            -kubernetes-version 1.29.0 \
            -ignore-missing-schemas \
            -summary \
            gitops/apps/*.yaml

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Security Scan (Trivy filesystem)
  # ─────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0           # Warn only — don't fail platform repo on app CVEs
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
