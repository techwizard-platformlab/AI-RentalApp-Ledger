name: "Platform Lint"

# Validates OPA Rego policy syntax and scans the repo for CVEs / secrets.
#
# What this covers:
#   opa-lint    → checks .rego files compile cleanly (catches syntax errors before
#                 they silently allow all traffic in conftest)
#   trivy-scan  → filesystem CVE + secret scan → uploads SARIF to GitHub Security tab
#
# What lives elsewhere:
#   Terraform fmt/validate → terraform.yml (azure_plan / gcp_plan)
#   K8s manifest validate  → k8s-validate.yml (kustomize build + kubeconform matrix)

on:
  # Auto triggers — enable after workflow is stable
  # push:
  #   branches: [main, "feature/**", "fix/**", "hotfix/**"]
  #   paths:
  #     - "platform/security/policies/**"
  #     - "infrastructure/**"
  #     - ".github/workflows/ci-build.yml"
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "platform/security/policies/**"
  #     - "infrastructure/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab
  id-token: write           # required for Azure OIDC (Key Vault secret fetch)

env:
  DISCORD_WEBHOOK_URL: ""         # populated at runtime from Key Vault

concurrency:
  group: platform-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # OPA Rego syntax lint
  # Catches broken policy files before they reach conftest in the plan pipeline.
  # ===========================================================================
  opa-lint:
    name: "OPA Rego Lint"
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install OPA
        run: |
          curl -sL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/
          opa version

      - name: Azure login (OIDC)
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a  # v3
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        run: |
          KV="${{ secrets.PLATFORM_KV_NAME }}"
          DISCORD=$(az keyvault secret show --vault-name "$KV" --name "rentalapp-discord-webhook" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$DISCORD" ]]; then
            echo "::add-mask::$DISCORD"
            echo "DISCORD_WEBHOOK_URL=$DISCORD" >> "$GITHUB_ENV"
          fi

      - name: Lint all Rego policies
        run: |
          find platform/security/policies -name "*.rego" | while read f; do
            echo "Checking: $f"
            opa check "$f"
          done

      - name: Job summary
        if: always()
        run: |
          echo "### OPA Rego Lint" >> $GITHUB_STEP_SUMMARY
          echo "Policies checked:" >> $GITHUB_STEP_SUMMARY
          find platform/security/policies -name "*.rego" | while read f; do
            echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
          done

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Platform Lint — OPA Rego Lint"

  # ===========================================================================
  # Trivy filesystem scan
  # Scans repo files for known CVEs in dependencies and leaked secrets.
  # exit-code: 0 — warns but does not block (platform repo has no app code).
  # Results appear in GitHub → Security → Code scanning alerts.
  # ===========================================================================
  trivy-scan:
    name: "Trivy Security Scan"
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Azure login (OIDC)
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a  # v3
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        run: |
          KV="${{ secrets.PLATFORM_KV_NAME }}"
          DISCORD=$(az keyvault secret show --vault-name "$KV" --name "rentalapp-discord-webhook" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$DISCORD" ]]; then
            echo "::add-mask::$DISCORD"
            echo "DISCORD_WEBHOOK_URL=$DISCORD" >> "$GITHUB_ENV"
          fi

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.61.0
          trivy --version

      - name: Run Trivy filesystem scan (SARIF → Security tab)
        run: |
          trivy fs \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            .
        continue-on-error: true

      - name: Run Trivy filesystem scan (HTML report)
        run: |
          trivy fs \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --ignore-unfixed \
            --format template \
            --template "@/usr/local/share/trivy/templates/html.tpl" \
            --output trivy-fs-report.html \
            .

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy HTML report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: trivy-filesystem-report
          path: trivy-fs-report.html
          retention-days: 14

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Platform Lint — Trivy Security Scan"
