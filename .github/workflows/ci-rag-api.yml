name: CI - RAG API Build & Push

on:
  push:
    branches: ["main"]
    paths:
      - "apps/ai-engine/rag/**"
      - ".github/workflows/ci-rag-api.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for Azure OIDC login and keyless signing

env:
  IMAGE_NAME: rental-rag-api

jobs:
  build-and-push:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR Name and Login
        id: acr
        run: |
          ACR_SERVER=$(az acr list \
            --resource-group "${{ secrets.TF_BACKEND_RG }}" \
            --query "[0].loginServer" -o tsv)
          ACR_NAME=$(echo "$ACR_SERVER" | cut -d'.' -f1)
          echo "acr_server=$ACR_SERVER" >> "$GITHUB_OUTPUT"
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/ai-engine/rag
          file: ./apps/ai-engine/rag/Dockerfile
          push: true
          tags: |
            ${{ steps.acr.outputs.acr_server }}/${{ env.IMAGE_NAME }}:latest
            ${{ steps.acr.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.acr.outputs.acr_server }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ steps.acr.outputs.acr_server }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "RAG API — Container Build & Push"
