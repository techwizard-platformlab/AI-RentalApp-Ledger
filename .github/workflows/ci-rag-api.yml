name: CI - RAG API Build & Push

on:
  push:
    branches: ["main"]
    paths:
      - "apps/ai-engine/rag/**"
      - ".github/workflows/ci-rag-api.yml"
      - ".github/scripts/azure/ci-rag-api.sh"
      - ".github/scripts/gcp/ci-rag-api.sh"
  workflow_dispatch:
    inputs:
      cloud:
        description: "Target registry cloud"
        required: true
        default: "azure"
        type: choice
        options: [azure, gcp]
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa, uat, prod]

permissions:
  contents: read
  id-token: write   # required for OIDC login (Azure and GCP)

env:
  IMAGE_NAME: rental-rag-api
  IMAGE_TAG:  ${{ github.sha }}
  ENV:        ${{ github.event.inputs.environment || 'dev' }}
  CLOUD:      ${{ github.event.inputs.cloud || 'azure' }}
  DISCORD_WEBHOOK_URL: ""   # populated at runtime from cloud secrets store

jobs:
  build-and-push:
    name: "Build & Push (${{ github.event.inputs.cloud || 'azure' }}/${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      # ── Azure auth ───────────────────────────────────────────────────────
      - name: Azure login (OIDC)
        if: env.CLOUD == 'azure'
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302  # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── GCP auth ─────────────────────────────────────────────────────────
      - name: GCP login (OIDC)
        if: env.CLOUD == 'gcp'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Cloud-specific setup (secrets + registry auth + tag outputs) ─────
      - name: Azure registry setup
        id: cloud_setup
        if: env.CLOUD == 'azure'
        env:
          PLATFORM_KV_NAME: ${{ secrets.PLATFORM_KV_NAME }}
        run: bash .github/scripts/azure/ci-rag-api.sh

      - name: GCP registry setup
        id: cloud_setup_gcp
        if: env.CLOUD == 'gcp'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION:     ${{ secrets.GCP_REGION || 'us-central1' }}
        run: bash .github/scripts/gcp/ci-rag-api.sh

      # ── Build & Push ─────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (Azure ACR)
        if: env.CLOUD == 'azure'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/ai-engine/rag
          file:    ./apps/ai-engine/rag/Dockerfile
          push: true
          tags: ${{ steps.cloud_setup.outputs.image_tags }}
          cache-from: type=registry,ref=${{ steps.cloud_setup.outputs.cache_ref }}
          cache-to:   type=registry,ref=${{ steps.cloud_setup.outputs.cache_ref }},mode=max

      - name: Build & Push (GCP Artifact Registry)
        if: env.CLOUD == 'gcp'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/ai-engine/rag
          file:    ./apps/ai-engine/rag/Dockerfile
          push: true
          tags: ${{ steps.cloud_setup_gcp.outputs.image_tags }}
          cache-from: type=registry,ref=${{ steps.cloud_setup_gcp.outputs.cache_ref }}
          cache-to:   type=registry,ref=${{ steps.cloud_setup_gcp.outputs.cache_ref }},mode=max

      # ── Notify ───────────────────────────────────────────────────────────
      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status:  ${{ job.status }}
          title:   "RAG API — Build & Push (${{ env.CLOUD }}/${{ env.ENV }})"
