name: ArgoCD Bootstrap

# Installs / manages ArgoCD and platform add-ons on a Kubernetes cluster.
# Supports Azure (AKS) and GCP (GKE). Cloud-specific logic lives in:
#   .github/scripts/azure/bootstrap.sh
#   .github/scripts/gcp/bootstrap.sh
#
# Run ONCE after terraform apply succeeds, or re-run to upgrade / apply changes.

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Target cloud"
        required: true
        default: "azure"
        type: choice
        options: [azure, gcp]

      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa, uat, prod]

      action:
        description: "Action"
        required: true
        default: "install"
        type: choice
        options:
          - install           # Full install: ArgoCD + DB + AppProject + Application
          - upgrade           # Helm upgrade ArgoCD only (keep existing apps)
          - apply-apps        # Apply AppProject + Application (ArgoCD already running)
          - apply-addons      # Deploy Istio, Prometheus/Grafana via ArgoCD
          - uninstall-apps    # Remove ArgoCD Applications only (keep ArgoCD + add-ons)
          - uninstall-addons  # Remove Istio, Prometheus (keep ArgoCD + apps)
          - uninstall         # Remove ArgoCD namespace entirely

      addons:
        description: "Add-ons (only for action=apply-addons)"
        required: false
        default: "all"
        type: choice
        options:
          - all       # Istio + Prometheus/Grafana
          - istio
          - prometheus

      db_mode:
        description: "Database backend"
        required: false
        default: "azure-pg"
        type: choice
        options:
          - azure-pg   # Azure PostgreSQL Flexible Server (Key Vault creds)
          - azure-sql  # Azure SQL Database (Key Vault creds)
          - helm-pg    # In-cluster Bitnami PostgreSQL (no cloud DB needed)
          - gcp-pg     # GCP Cloud SQL PostgreSQL (Secret Manager creds)
          - cloudsql   # Alias for gcp-pg

permissions:
  contents: write   # push ACR patch commit back to repo
  id-token: write   # OIDC login (Azure and GCP)

concurrency:
  group: argocd-${{ github.event.inputs.cloud }}-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  ARGOCD_VERSION:  "7.3.11"
  NAMESPACE_ARGOCD: argocd
  NAMESPACE_APP:   "rental-${{ github.event.inputs.environment }}"
  ENV:             ${{ github.event.inputs.environment }}
  ACTION:          ${{ github.event.inputs.action }}
  DB_MODE:         ${{ github.event.inputs.db_mode }}
  ADDONS:          ${{ github.event.inputs.addons }}
  CLOUD:           ${{ github.event.inputs.cloud }}
  DISCORD_WEBHOOK_URL: ""   # populated at runtime by bootstrap script

jobs:
  bootstrap:
    name: "${{ github.event.inputs.action }} / ${{ github.event.inputs.cloud }} / ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ── Azure auth ───────────────────────────────────────────────────────
      - name: Azure login (OIDC)
        if: env.CLOUD == 'azure'
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302  # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── GCP auth ─────────────────────────────────────────────────────────
      - name: GCP login (OIDC)
        if: env.CLOUD == 'gcp'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        if: env.CLOUD == 'gcp'
        uses: google-github-actions/setup-gcloud@v2

      # ── Cloud-specific bootstrap ──────────────────────────────────────────
      - name: Run Azure bootstrap
        if: env.CLOUD == 'azure'
        id: bootstrap
        env:
          PLATFORM_KV_NAME:  ${{ secrets.PLATFORM_KV_NAME }}
          AKS_NAME:          "${{ github.event.inputs.environment }}-aks"
          LOCATION_SHORT:    ${{ secrets.AZURE_LOCATION_SHORT || 'eus2' }}
          GITOPS_REPO_URL:   "https://github.com/${{ github.repository }}"
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL || 'alerts@example.com' }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST || 'smtp.example.com' }}
          SMTP_USERNAME:     ${{ secrets.SMTP_USERNAME || '' }}
        run: bash .github/scripts/azure/bootstrap.sh

      - name: Run GCP bootstrap
        if: env.CLOUD == 'gcp'
        id: bootstrap_gcp
        env:
          GCP_PROJECT_ID:    ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION:        ${{ secrets.GCP_REGION || 'us-central1' }}
          GKE_CLUSTER_NAME:  "${{ github.event.inputs.environment }}-gke"
          GKE_CLUSTER_ZONE:  ${{ secrets.GKE_CLUSTER_ZONE || 'us-central1-a' }}
          GCP_GSA_EMAIL:     ${{ secrets.GCP_GSA_EMAIL || '' }}
          ESO_GSA_EMAIL:     ${{ secrets.ESO_GSA_EMAIL || '' }}
          GITOPS_REPO_URL:   "https://github.com/${{ github.repository }}"
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL || 'alerts@example.com' }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST || 'smtp.example.com' }}
          SMTP_USERNAME:     ${{ secrets.SMTP_USERNAME || '' }}
        run: bash .github/scripts/gcp/bootstrap.sh

      # ── Summary ───────────────────────────────────────────────────────────
      - name: ArgoCD admin password
        if: contains(fromJSON('["install","apply-apps"]'), env.ACTION)
        id: argocd_pass
        run: |
          PASS=$(kubectl get secret argocd-initial-admin-secret \
            -n "${{ env.NAMESPACE_ARGOCD }}" \
            -o jsonpath="{.data.password}" 2>/dev/null | base64 -d || echo "already-changed")
          echo "::add-mask::$PASS"
          echo "password=$PASS" >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: always()
        run: |
          CLOUD="${{ env.CLOUD }}"
          ENV="${{ env.ENV }}"
          ACTION="${{ env.ACTION }}"
          ARGOCD_IP="${{ steps.bootstrap.outputs.argocd_ip }}${{ steps.bootstrap_gcp.outputs.argocd_ip }}"

          {
            echo "## ArgoCD Bootstrap — ${ACTION} / ${CLOUD} / ${ENV}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Cloud | ${CLOUD} |"
            echo "| Environment | ${ENV} |"
            echo "| Action | ${ACTION} |"
            echo "| DB Mode | ${{ env.DB_MODE }} |"
            echo "| ArgoCD UI | http://${ARGOCD_IP:-pending} |"
            echo ""
            echo "### Next steps"
            echo "1. Open https://${ARGOCD_IP:-\<IP\>} (accept cert warning)"
            echo "2. Login: admin / retrieve password from \`argocd-initial-admin-secret\`"
            echo "3. GitOps repo is registered — app should show Synced"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Discord notification ──────────────────────────────────────────────
      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status:  ${{ job.status }}
          title:   "ArgoCD Bootstrap — ${{ env.ACTION }} (${{ env.CLOUD }}/${{ env.ENV }})"
