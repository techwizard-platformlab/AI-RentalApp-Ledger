name: ArgoCD Bootstrap

# Installs and configures ArgoCD on AKS/GKE and applies AppProject + Application manifests.
# Cloud-specific logic is delegated to .github/scripts/<cloud>/bootstrap.sh.
# Run after terraform apply succeeds, or any time the environment is recreated.

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Target cloud"
        required: true
        default: "azure"
        type: choice
        options: [azure, gcp]

      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa, uat, prod]

      action:
        description: "Action"
        required: true
        default: "install"
        type: choice
        options:
          - install           # Full install: ArgoCD + ESO + app secrets + register repo
          - upgrade           # Helm upgrade ArgoCD only
          - apply-apps        # Apply AppProject + Application CRDs (ArgoCD already running)
          - apply-addons      # Deploy platform add-ons (Istio, Prometheus/Grafana) via ArgoCD
          - uninstall-apps    # Remove ArgoCD Application + AppProject only
          - uninstall-addons  # Remove Istio + Prometheus ArgoCD Applications
          - uninstall         # Remove everything: apps + addons + ArgoCD namespace

      addons:
        description: "Add-ons scope (only used when action=apply-addons or uninstall-addons)"
        required: false
        default: "all"
        type: choice
        options:
          - all         # Istio + Prometheus/Grafana
          - istio       # Istio service mesh only
          - prometheus  # Prometheus + Grafana + Alertmanager only

      db_mode:
        description: "Database backend"
        required: false
        default: "azure-pg"
        type: choice
        options:
          - azure-pg    # Azure PostgreSQL Flexible Server (creds from Key Vault)
          - azure-sql   # Azure SQL Database (creds from Key Vault)
          - helm-pg     # In-cluster PostgreSQL via Bitnami Helm (no managed DB)
          - gcp-pg      # Cloud SQL PostgreSQL (creds from Secret Manager)
          - cloudsql    # Cloud SQL via Cloud SQL Proxy (creds from Secret Manager)

permissions:
  contents: write   # required to push ACR patch commit back to repo
  id-token: write   # required for OIDC login (Azure + GCP)

concurrency:
  group: argocd-${{ github.event.inputs.cloud }}-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  DISCORD_WEBHOOK_URL: ""   # populated at runtime from Key Vault / Secret Manager

jobs:
  bootstrap:
    name: "${{ github.event.inputs.action }} / ${{ github.event.inputs.cloud }} / ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ── Azure login (OIDC) ──────────────────────────────────────────────────
      - name: Azure login
        if: github.event.inputs.cloud == 'azure'
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302  # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── GCP login (OIDC / Workload Identity) ───────────────────────────────
      - name: GCP login
        if: github.event.inputs.cloud == 'gcp'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        if: github.event.inputs.cloud == 'gcp'
        uses: google-github-actions/setup-gcloud@v2

      # ── Fetch Discord webhook (Azure path) ─────────────────────────────────
      - name: Fetch Discord webhook from Key Vault
        if: github.event.inputs.cloud == 'azure'
        run: |
          KV="${{ secrets.PLATFORM_KV_NAME }}"
          DISCORD=$(az keyvault secret show --vault-name "$KV" \
            --name "rentalapp-discord-webhook" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$DISCORD" ]]; then
            echo "::add-mask::$DISCORD"
            echo "DISCORD_WEBHOOK_URL=$DISCORD" >> "$GITHUB_ENV"
          fi

      # ── Fetch Discord webhook (GCP path) ───────────────────────────────────
      - name: Fetch Discord webhook from Secret Manager
        if: github.event.inputs.cloud == 'gcp'
        run: |
          DISCORD=$(gcloud secrets versions access latest \
            --secret="rentalapp-discord-webhook" \
            --project="${{ secrets.GCP_PROJECT_ID }}" 2>/dev/null || true)
          if [[ -n "$DISCORD" ]]; then
            echo "::add-mask::$DISCORD"
            echo "DISCORD_WEBHOOK_URL=$DISCORD" >> "$GITHUB_ENV"
          fi

      # ── Install kubectl + Helm ──────────────────────────────────────────────
      - name: Install Helm
        run: |
          curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # ── Azure bootstrap ─────────────────────────────────────────────────────
      - name: Run Azure bootstrap
        if: github.event.inputs.cloud == 'azure'
        env:
          ACTION:               ${{ github.event.inputs.action }}
          ENVIRONMENT:          ${{ github.event.inputs.environment }}
          DB_MODE:              ${{ github.event.inputs.db_mode }}
          ADDONS:               ${{ github.event.inputs.addons }}
          PLATFORM_KV_NAME:     ${{ secrets.PLATFORM_KV_NAME }}
          AZURE_SHARED_RG:      ${{ secrets.TF_SHARED_RG }}
          GITHUB_ORG:           ${{ github.repository_owner }}
          GITHUB_REPO:          ${{ github.event.repository.name }}
          ARGOCD_GITHUB_PAT:    ${{ secrets.ARGOCD_GITHUB_PAT }}
        run: bash .github/scripts/azure/bootstrap.sh

      # ── GCP bootstrap ───────────────────────────────────────────────────────
      - name: Run GCP bootstrap
        if: github.event.inputs.cloud == 'gcp'
        env:
          ACTION:               ${{ github.event.inputs.action }}
          ENVIRONMENT:          ${{ github.event.inputs.environment }}
          DB_MODE:              ${{ github.event.inputs.db_mode }}
          ADDONS:               ${{ github.event.inputs.addons }}
          GCP_PROJECT_ID:       ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION:           ${{ secrets.GCP_REGION }}
          GITHUB_ORG:           ${{ github.repository_owner }}
          GITHUB_REPO:          ${{ github.event.repository.name }}
          ARGOCD_GITHUB_PAT:    ${{ secrets.ARGOCD_GITHUB_PAT }}
        run: bash .github/scripts/gcp/bootstrap.sh

      # ── Notify Discord ──────────────────────────────────────────────────────
      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status:  ${{ job.status }}
          title:   "ArgoCD Bootstrap — ${{ github.event.inputs.action }} (${{ github.event.inputs.cloud }}/${{ github.event.inputs.environment }})"
