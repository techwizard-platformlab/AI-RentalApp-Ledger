name: ArgoCD Bootstrap

# Installs ArgoCD on AKS and applies AppProject + Application manifests.
# Run this ONCE after terraform apply succeeds.
# Re-run any time the environment is recreated.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa]

      action:
        description: "Action"
        required: true
        default: "install"
        type: choice
        options:
          - install        # Full install: ArgoCD + PostgreSQL + AppProject + Application
          - upgrade        # Helm upgrade only (keep ArgoCD apps)
          - apply-apps     # Apply AppProject + Application only (ArgoCD already running)
          - apply-addons   # Deploy platform add-ons (Istio, Prometheus/Grafana) via ArgoCD
          - uninstall      # Remove ArgoCD namespace entirely

      addons:
        description: "Add-ons to deploy (only used when action=apply-addons)"
        required: false
        default: "all"
        type: choice
        options:
          - all             # Deploy all add-ons: Istio + Prometheus/Grafana
          - istio           # Istio service mesh only
          - prometheus      # Prometheus + Grafana + Alertmanager only

      db_mode:
        description: "Database backend to use"
        required: false
        default: "azure-pg"
        type: choice
        options:
          - azure-pg    # Azure PostgreSQL Flexible Server — pulls creds from Key Vault
          - helm-pg     # In-cluster PostgreSQL via Bitnami Helm chart (no Azure DB needed)
          - azure-sql   # Azure SQL Database Basic/S-tier — pulls creds from Key Vault

permissions:
  contents: write   # required to push the ACR patch commit back to the repo
  id-token: write   # required for OIDC Azure login

concurrency:
  group: argocd-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  ARGOCD_VERSION: "7.3.11"        # argo-cd Helm chart version (ArgoCD v2.11)
  AKS_NAME: "${{ github.event.inputs.environment }}-eus2-aks"
  NAMESPACE_ARGOCD: argocd
  NAMESPACE_APP: "rental-${{ github.event.inputs.environment }}"
  DISCORD_WEBHOOK_URL: ""         # populated at runtime from Key Vault

jobs:
  bootstrap:
    name: "ArgoCD ${{ github.event.inputs.action }} / ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ── Azure login (OIDC / Managed Identity — no client secret) ──────────────
      - name: Azure login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302  # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        run: |
          KV="techwizard-plt-kv"
          DISCORD=$(az keyvault secret show --vault-name "$KV" --name "rentalapp-discord-webhook" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$DISCORD" ]]; then
            echo "::add-mask::$DISCORD"
            echo "DISCORD_WEBHOOK_URL=$DISCORD" >> "$GITHUB_ENV"
          fi
          ARGOCD_PAT=$(az keyvault secret show --vault-name "$KV" --name "argocd-github-pat" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$ARGOCD_PAT" ]]; then
            echo "::add-mask::$ARGOCD_PAT"
            echo "ARGOCD_GITHUB_PAT=$ARGOCD_PAT" >> "$GITHUB_ENV"
          fi

      # ── Get AKS credentials ─────────────────────────────────────────────────
      - name: Get AKS credentials
        run: |
          ENV="${{ github.event.inputs.environment }}"
          ENV_RG="my-Rental-App-${ENV^}"   # e.g. my-Rental-App-Dev
          az aks get-credentials \
            --resource-group "$ENV_RG" \
            --name "${{ env.AKS_NAME }}" \
            --overwrite-existing
          kubectl get nodes

      # ── Fetch ACR login server dynamically ─────────────────────────────────
      - name: Get ACR login server
        id: acr
        run: |
          # Read from env KV secret (written by Terraform after apply); fall back to az acr list
          ENV_RG="my-Rental-App-$(echo "${{ github.event.inputs.environment }}" | sed 's/./\u&/')"
          ACR_SERVER=$(az keyvault secret show \
            --vault-name "techwizard-plt-kv" \
            --name "acr-login-server" \
            --query value -o tsv 2>/dev/null || \
          az acr list \
            --resource-group "$ENV_RG" \
            --query "[0].loginServer" -o tsv)
          echo "login_server=$ACR_SERVER" >> "$GITHUB_OUTPUT"
          echo "ACR login server: $ACR_SERVER"

      # ── Patch kustomize overlay with real ACR server + push to git ──────────
      # Replaces ACR_LOGIN_SERVER placeholder in platform/kubernetes/overlays/dev/kustomization.yaml
      # so ArgoCD can resolve the full image reference without needing Image Updater
      # to do the first pull. The PAT needs repo write scope.
      - name: Patch ACR image in kustomize overlay
        if: github.event.inputs.action != 'uninstall'
        run: |
          ACR_SERVER="${{ steps.acr.outputs.login_server }}"
          # Replace either:
          #   • the placeholder "ACR_LOGIN_SERVER" (first run / after git reset)
          #   • any existing ACR URL "*.azurecr.io" (env recreated → new ACR name)
          # This way re-running bootstrap always patches to the current ACR, no manual edits.
          # Delimiter is # (not |) to avoid clash with | used for regex alternation in the pattern.
          sed -i -E "s#(ACR_LOGIN_SERVER|[a-z0-9]+\.azurecr\.io)#${ACR_SERVER}#g" \
            platform/kubernetes/overlays/${{ github.event.inputs.environment }}/kustomization.yaml

          git config user.email "argocd-bootstrap@github-actions"
          git config user.name "ArgoCD Bootstrap"
          git add platform/kubernetes/overlays/${{ github.event.inputs.environment }}/kustomization.yaml
          git diff --cached --quiet && echo "No ACR change needed" && exit 0
          git commit -m "ci: set ACR server ${ACR_SERVER} in dev overlay"
          # Use GITHUB_TOKEN (auto-provided, no secret needed) with contents: write permission.
          # Push to the branch this workflow was triggered from — never hardcode main.
          git push \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            HEAD:${{ github.ref_name }}

      # ── Create ACR imagePullSecret in app namespace ─────────────────────────
      - name: Create ACR imagePullSecret
        if: github.event.inputs.action != 'uninstall'
        run: |
          kubectl create namespace "${{ env.NAMESPACE_APP }}" --dry-run=client -o yaml | kubectl apply -f -

          ACR_SERVER="${{ steps.acr.outputs.login_server }}"
          # Derive ACR name from the login server (e.g. deveusacrjek7wu.azurecr.io → deveusacrjek7wu)
          # so no ACR_NAME secret is needed.
          ACR_NAME=$(echo "$ACR_SERVER" | cut -d'.' -f1)
          # Admin user is disabled by default — enable it so credential show works.
          az acr update --name "$ACR_NAME" --admin-enabled true --output none
          ACR_PASSWORD=$(az acr credential show \
            --name "$ACR_NAME" \
            --query "passwords[0].value" -o tsv)

          kubectl create secret docker-registry acr-pull-secret \
            --namespace "${{ env.NAMESPACE_APP }}" \
            --docker-server="${ACR_SERVER}" \
            --docker-username="${ACR_NAME}" \
            --docker-password="${ACR_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Option A: Deploy PostgreSQL via Helm inside AKS ──────────────────────
      # Bitnami PostgreSQL chart — no Azure resource provider needed.
      # Chosen when db_mode == 'helm-pg'.
      - name: Deploy PostgreSQL via Helm (in-cluster)
        if: |
          github.event.inputs.action != 'uninstall' &&
          github.event.inputs.db_mode == 'helm-pg'
        id: pg_helm
        run: |
          NS="${{ env.NAMESPACE_APP }}"
          DB_PASSWORD=$(openssl rand -base64 32 | tr -d '/+=')
          DJANGO_SECRET_KEY=$(openssl rand -base64 64 | tr -d '/+=')

          # Store generated passwords in Key Vault for reference
          KV_NAME=$(az keyvault list \
            --resource-group "${{ secrets.TF_BACKEND_RG }}" \
            --query "[0].name" -o tsv 2>/dev/null || echo "")

          if [ -n "$KV_NAME" ]; then
            az keyvault secret set --vault-name "$KV_NAME" --name "db-password"      --value "$DB_PASSWORD"      --output none
            az keyvault secret set --vault-name "$KV_NAME" --name "django-secret-key" --value "$DJANGO_SECRET_KEY" --output none
          fi

          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

          helm upgrade --install postgresql bitnami/postgresql \
            --namespace "$NS" \
            --values platform/gitops/argocd/helm/postgresql/values-dev.yaml \
            --set auth.password="$DB_PASSWORD" \
            --set auth.postgresPassword="$DB_PASSWORD" \
            --timeout 5m \
            --wait

          # Outputs for secret creation step
          echo "db_host=postgresql.$NS.svc.cluster.local" >> "$GITHUB_OUTPUT"
          echo "db_name=rental_db"                        >> "$GITHUB_OUTPUT"
          echo "db_user=rentaladmin"                      >> "$GITHUB_OUTPUT"
          echo "db_password=$DB_PASSWORD"                 >> "$GITHUB_OUTPUT"
          echo "db_port=5432"                             >> "$GITHUB_OUTPUT"
          echo "django_secret_key=$DJANGO_SECRET_KEY"     >> "$GITHUB_OUTPUT"

      # ── Option B: Pull secrets from Key Vault (Azure SQL or Azure PostgreSQL) ─
      # Used when db_mode == 'azure-sql' (default) or 'azure-pg'.
      # Terraform writes all secrets to Key Vault during infrastructure provisioning.
      - name: Fetch secrets from Key Vault
        if: |
          github.event.inputs.action != 'uninstall' &&
          (github.event.inputs.db_mode == 'azure-sql' || github.event.inputs.db_mode == 'azure-pg' || github.event.inputs.db_mode == '')
        id: pg_kv
        run: |
          KV_NAME=$(az keyvault list \
            --resource-group "${{ secrets.TF_BACKEND_RG }}" \
            --query "[0].name" -o tsv)

          fetch() { az keyvault secret show --vault-name "$KV_NAME" --name "$1" --query value -o tsv; }

          echo "db_host=$(fetch db-host)"                     >> "$GITHUB_OUTPUT"
          echo "db_name=$(fetch db-name)"                     >> "$GITHUB_OUTPUT"
          echo "db_user=$(fetch db-user)"                     >> "$GITHUB_OUTPUT"
          echo "db_password=$(fetch db-password)"             >> "$GITHUB_OUTPUT"
          echo "db_port=$(fetch db-port)"                     >> "$GITHUB_OUTPUT"
          echo "django_secret_key=$(fetch django-secret-key)" >> "$GITHUB_OUTPUT"

      # ── Create K8s app secrets (all db_modes write same secret names) ────────
      - name: Create app secrets
        if: github.event.inputs.action != 'uninstall'
        run: |
          NS="${{ env.NAMESPACE_APP }}"
          MODE="${{ github.event.inputs.db_mode }}"
          MODE="${MODE:-azure-pg}"

          if [ "$MODE" = "helm-pg" ]; then
            DB_ENGINE="django.db.backends.postgresql"
            DB_HOST="${{ steps.pg_helm.outputs.db_host }}"
            DB_NAME="${{ steps.pg_helm.outputs.db_name }}"
            DB_USER="${{ steps.pg_helm.outputs.db_user }}"
            DB_PASS="${{ steps.pg_helm.outputs.db_password }}"
            DB_PORT="${{ steps.pg_helm.outputs.db_port }}"
            SECRET_KEY="${{ steps.pg_helm.outputs.django_secret_key }}"
            DB_SSLMODE="disable"
          elif [ "$MODE" = "azure-sql" ]; then
            # Azure SQL Database (SQL Server/MSSQL)
            DB_ENGINE="mssql"
            DB_HOST="${{ steps.pg_kv.outputs.db_host }}"
            DB_NAME="${{ steps.pg_kv.outputs.db_name }}"
            DB_USER="${{ steps.pg_kv.outputs.db_user }}"
            DB_PASS="${{ steps.pg_kv.outputs.db_password }}"
            DB_PORT="1433"
            SECRET_KEY="${{ steps.pg_kv.outputs.django_secret_key }}"
            DB_SSLMODE="require"
          else
            # azure-pg (default) — Azure PostgreSQL Flexible Server
            DB_ENGINE="django.db.backends.postgresql"
            DB_HOST="${{ steps.pg_kv.outputs.db_host }}"
            DB_NAME="${{ steps.pg_kv.outputs.db_name }}"
            DB_USER="${{ steps.pg_kv.outputs.db_user }}"
            DB_PASS="${{ steps.pg_kv.outputs.db_password }}"
            DB_PORT="${{ steps.pg_kv.outputs.db_port }}"
            SECRET_KEY="${{ steps.pg_kv.outputs.django_secret_key }}"
            DB_SSLMODE="require"
          fi

          for SVC in api-gateway rental-service ledger-service notification-service rag-api; do
            kubectl create secret generic "${SVC}-secret" \
              --namespace "$NS" \
              --from-literal=SECRET_KEY="$SECRET_KEY" \
              --from-literal=DB_ENGINE="$DB_ENGINE" \
              --from-literal=DB_HOST="$DB_HOST" \
              --from-literal=DB_NAME="$DB_NAME" \
              --from-literal=DB_USER="$DB_USER" \
              --from-literal=DB_PASSWORD="$DB_PASS" \
              --from-literal=DB_PORT="$DB_PORT" \
              --from-literal=DB_SSLMODE="$DB_SSLMODE" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      # ── Install / Upgrade ArgoCD via Helm ──────────────────────────────────
      - name: Add Argo Helm repo
        if: github.event.inputs.action == 'install' || github.event.inputs.action == 'upgrade'
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

      - name: Install ArgoCD
        if: github.event.inputs.action == 'install'
        run: |
          kubectl create namespace "${{ env.NAMESPACE_ARGOCD }}" --dry-run=client -o yaml | kubectl apply -f -

          # upgrade --install is idempotent — safe to re-run if install was interrupted
          helm upgrade --install argocd argo/argo-cd \
            --namespace "${{ env.NAMESPACE_ARGOCD }}" \
            --version "${{ env.ARGOCD_VERSION }}" \
            --values platform/gitops/argocd/argocd/install-values.yaml \
            --set server.service.type=LoadBalancer \
            --set server.ingress.enabled=false \
            --timeout 10m \
            --wait

      - name: Upgrade ArgoCD
        if: github.event.inputs.action == 'upgrade'
        run: |
          helm upgrade argocd argo/argo-cd \
            --namespace "${{ env.NAMESPACE_ARGOCD }}" \
            --version "${{ env.ARGOCD_VERSION }}" \
            --values platform/gitops/argocd/argocd/install-values.yaml \
            --set server.service.type=LoadBalancer \
            --set server.ingress.enabled=false \
            --timeout 10m \
            --wait

      # ── Wait for ArgoCD server pod ready, then get external IP ────────────────
      - name: Wait for ArgoCD LoadBalancer IP
        if: github.event.inputs.action == 'install' || github.event.inputs.action == 'upgrade'
        id: argocd_ip
        run: |
          # Wait for the deployment itself to be ready before polling for IP
          echo "Waiting for argocd-server deployment..."
          kubectl rollout status deployment/argocd-server \
            -n "${{ env.NAMESPACE_ARGOCD }}" --timeout=8m

          echo "Waiting for LoadBalancer external IP..."
          for i in $(seq 1 36); do
            IP=$(kubectl get svc argocd-server -n "${{ env.NAMESPACE_ARGOCD }}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            [ -z "$IP" ] && IP=$(kubectl get svc argocd-server -n "${{ env.NAMESPACE_ARGOCD }}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "ip=$IP" >> "$GITHUB_OUTPUT"
              echo "ArgoCD endpoint: $IP"
              break
            fi
            echo "Attempt $i/36 — waiting 10s..."
            sleep 10
          done
          if [ -z "$IP" ]; then
            echo "::error::ArgoCD LoadBalancer did not get an external IP/hostname after 6 minutes"
            exit 1
          fi

      # ── Register GitHub repo credentials with ArgoCD ───────────────────────
      # Creates a Kubernetes secret with ArgoCD's repository label so ArgoCD
      # can pull manifests from the private GitOps repo without CLI interaction.
      # Requires secret: ARGOCD_GITHUB_PAT (repo read scope is sufficient)
      - name: Register GitOps repo credentials
        if: github.event.inputs.action != 'uninstall'
        run: |
          # Use jq to inject the ArgoCD label — more reliable than kubectl label --local pipe.
          # jq is pre-installed on all GitHub Actions ubuntu runners.
          kubectl create secret generic argocd-repo-ai-rentalapp-ledger \
            --namespace "${{ env.NAMESPACE_ARGOCD }}" \
            --from-literal=type=git \
            --from-literal=url=https://github.com/techwizard-platformlab/AI-RentalApp-Ledger \
            --from-literal=username=techwizard-platformlab \
            --from-literal=password="$ARGOCD_GITHUB_PAT" \
            --dry-run=client -o json \
          | jq '.metadata.labels["argocd.argoproj.io/secret-type"] = "repository"' \
          | kubectl apply -f -

      # ── Apply AppProject ────────────────────────────────────────────────────
      - name: Apply ArgoCD AppProject
        if: github.event.inputs.action != 'uninstall' && github.event.inputs.action != 'apply-addons'
        run: |
          kubectl apply -f platform/gitops/argocd/apps/appproject.yaml

      # ── Apply Application (with ACR login server substituted) ───────────────
      - name: Apply ArgoCD Application
        if: github.event.inputs.action != 'uninstall' && github.event.inputs.action != 'apply-addons'
        run: |
          ACR_SERVER="${{ steps.acr.outputs.login_server }}"
          sed "s|ACR_LOGIN_SERVER|${ACR_SERVER}|g" \
            platform/gitops/argocd/apps/app-${{ github.event.inputs.environment }}.yaml \
            | kubectl apply -f -

      # ── Apply Platform Add-ons via ArgoCD ────────────────────────────────────
      # Creates ArgoCD Application CRDs — ArgoCD then handles Helm install automatically.
      # Grafana admin password is fetched from Key Vault and stored as a K8s Secret
      # before the Application is applied so Grafana can start up without manual intervention.
      - name: Create Grafana admin secret from Key Vault
        if: |
          github.event.inputs.action == 'apply-addons' &&
          (github.event.inputs.addons == 'all' || github.event.inputs.addons == 'prometheus')
        run: |
          KV_NAME=$(az keyvault list \
            --resource-group "${{ secrets.TF_BACKEND_RG }}" \
            --query "[0].name" -o tsv)

          # Fetch Grafana password — auto-generate and store if not yet set
          GRAFANA_PASS=$(az keyvault secret show \
            --vault-name "$KV_NAME" --name "grafana-admin-password" \
            --query value -o tsv 2>/dev/null || echo "")

          if [ -z "$GRAFANA_PASS" ]; then
            GRAFANA_PASS=$(openssl rand -base64 24 | tr -d '/+=')
            az keyvault secret set \
              --vault-name "$KV_NAME" \
              --name "grafana-admin-password" \
              --value "$GRAFANA_PASS" \
              --output none
            echo "Generated and stored new Grafana admin password in Key Vault."
          else
            echo "Using existing Grafana admin password from Key Vault."
          fi

          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic grafana-admin-secret \
            --namespace monitoring \
            --from-literal=admin-user=admin \
            --from-literal=admin-password="$GRAFANA_PASS" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "::notice::Grafana admin password stored in Key Vault secret: grafana-admin-password"

      - name: Apply platform AppProject
        if: github.event.inputs.action == 'apply-addons'
        run: |
          kubectl apply -f platform/gitops/argocd/apps/platform-project.yaml

      - name: Deploy Istio via ArgoCD
        if: |
          github.event.inputs.action == 'apply-addons' &&
          (github.event.inputs.addons == 'all' || github.event.inputs.addons == 'istio')
        run: |
          kubectl apply -f platform/gitops/argocd/apps/istio-base-app.yaml
          echo "Waiting 30s for istio-base CRDs to be established before istiod..."
          sleep 30
          kubectl apply -f platform/gitops/argocd/apps/istiod-app.yaml
          echo "::notice::Istio Applications submitted to ArgoCD — monitor sync at https://20.85.34.239"

      - name: Deploy Prometheus/Grafana via ArgoCD
        if: |
          github.event.inputs.action == 'apply-addons' &&
          (github.event.inputs.addons == 'all' || github.event.inputs.addons == 'prometheus')
        run: |
          kubectl apply -f platform/gitops/argocd/apps/prometheus-app.yaml
          echo "::notice::kube-prometheus-stack Application submitted to ArgoCD — sync takes ~3-5 minutes"

      - name: Add-ons summary
        if: github.event.inputs.action == 'apply-addons'
        run: |
          echo "## Platform Add-ons Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Add-on | Status | Namespace |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|-----------|" >> "$GITHUB_STEP_SUMMARY"
          ADDONS="${{ github.event.inputs.addons }}"
          if [[ "$ADDONS" == "all" || "$ADDONS" == "istio" ]]; then
            echo "| Istio (base + istiod) | Syncing via ArgoCD | \`istio-system\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "$ADDONS" == "all" || "$ADDONS" == "prometheus" ]]; then
            echo "| Prometheus + Grafana + Alertmanager | Syncing via ArgoCD | \`monitoring\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Access Grafana" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "kubectl port-forward -n monitoring svc/kube-prometheus-stack-grafana 3000:80" >> "$GITHUB_STEP_SUMMARY"
          echo "# Open: http://localhost:3000  (admin / password from Key Vault: grafana-admin-password)" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "### Enable Istio Sidecar Injection (when ready)" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "kubectl label namespace rental-dev istio-injection=enabled --overwrite" >> "$GITHUB_STEP_SUMMARY"
          echo "kubectl rollout restart deployment -n rental-dev" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      # ── Uninstall ───────────────────────────────────────────────────────────
      - name: Uninstall ArgoCD
        if: github.event.inputs.action == 'uninstall'
        run: |
          helm uninstall argocd --namespace "${{ env.NAMESPACE_ARGOCD }}" || true
          kubectl delete namespace "${{ env.NAMESPACE_ARGOCD }}" --ignore-not-found

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Get ArgoCD initial admin password
        if: github.event.inputs.action == 'install' || github.event.inputs.action == 'apply-apps'
        id: argocd_pass
        run: |
          PASS=$(kubectl get secret argocd-initial-admin-secret \
            -n "${{ env.NAMESPACE_ARGOCD }}" \
            -o jsonpath="{.data.password}" 2>/dev/null | base64 -d || echo "already-changed")
          echo "password=$PASS" >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: always()
        run: |
          echo "## ArgoCD Bootstrap — ${{ github.event.inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Action | ${{ github.event.inputs.action }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| AKS Cluster | ${{ env.AKS_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ACR | ${{ steps.acr.outputs.login_server }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ArgoCD UI | http://${{ steps.argocd_ip.outputs.ip }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ArgoCD Username | admin |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ArgoCD Password | ${{ steps.argocd_pass.outputs.password }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next steps" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Open https://${{ steps.argocd_ip.outputs.ip }} in your browser (accept cert warning)" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Login with admin / password above" >> "$GITHUB_STEP_SUMMARY"
          echo "3. GitOps repo is already registered — app should show Synced" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Run the CI workflow (techwizard-platformlab/RentalApp-Build) with registry: acr to push the first image" >> "$GITHUB_STEP_SUMMARY"
          echo "5. ArgoCD will auto-sync and deploy the app" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "ArgoCD Bootstrap — ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})"
