name: Cost Check (OPA Plan + Infracost)

on:
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/**"
      - "platform/security/policies/cost/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  cost-check:
    name: Infracost + OPA Cost Guard
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [azure, gcp]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ── Azure OIDC ──────────────────────────────────────────────────────────
      - name: Azure login (OIDC)
        if: matrix.cloud == 'azure'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── GCP OIDC ────────────────────────────────────────────────────────────
      - name: GCP login (OIDC)
        if: matrix.cloud == 'gcp'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Terraform plan ──────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: 1.5.7

      - name: Terraform init + plan (${{ matrix.cloud }})
        working-directory: infrastructure/${{ matrix.cloud }}/environments/dev
        run: |
          terraform init
          terraform plan -out=tfplan
          terraform show -json tfplan > plan.json

      # ── Infracost ───────────────────────────────────────────────────────────
      - name: Setup Infracost
        uses: infracost/actions/setup@e9d6e6cd65e168e76b0de50ff9957d2fe8bb1832  # v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Run Infracost breakdown
        working-directory: infrastructure/${{ matrix.cloud }}/environments/dev
        run: |
          infracost breakdown \
            --path . \
            --format json \
            --out-file infracost.json \
            --config-file ../../../../.infracost/config.yml

      # ── OPA cost guard ──────────────────────────────────────────────────────
      - name: Install conftest
        run: |
          CONFTEST_VERSION=v0.50.0
          wget -qO conftest.tar.gz \
            "https://github.com/open-policy-agent/conftest/releases/download/${CONFTEST_VERSION}/conftest_0.50.0_Linux_x86_64.tar.gz"
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      # ── OPA: evaluate cost from terraform plan JSON (no external API needed) ─
      - name: OPA cost check — terraform plan
        id: opa_plan_cost
        working-directory: infrastructure/${{ matrix.cloud }}/environments/dev
        run: |
          set +e
          conftest test plan.json \
            --namespace cost_tfplan \
            --policy ../../../../platform/security/policies/cost/tf_plan_cost.rego \
            --output json > opa_plan_result.json 2>&1
          PLAN_EXIT=$?
          echo "exit_code=${PLAN_EXIT}" >> "$GITHUB_OUTPUT"

          echo "=== OPA Terraform Plan Cost Result ==="
          cat opa_plan_result.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for result in data:
              for failure in result.get('failures', []):
                  print(f'  DENY: {failure[\"msg\"]}')
              for warning in result.get('warnings', []):
                  print(f'  WARN: {warning[\"msg\"]}')
          if not any(r.get('failures') or r.get('warnings') for r in data):
              print('  OK: cost within budget')
          " 2>/dev/null || cat opa_plan_result.json
          set -e

      # ── OPA: evaluate cost from Infracost JSON (API-priced, more accurate) ──
      - name: OPA cost check — infracost output
        id: opa_cost
        working-directory: infrastructure/${{ matrix.cloud }}/environments/dev
        run: |
          set +e
          conftest test infracost.json \
            --namespace cost \
            --policy ../../../../platform/security/policies/cost/cost_guard.rego \
            --output json > opa_cost_result.json 2>&1
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          set -e

      # ── PR comment with cost breakdown ────────────────────────────────────────
      - name: Post cost breakdown as PR comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const cloud = '${{ matrix.cloud }}';
            const base = `infrastructure/${cloud}/environments/dev`;

            // ── Infracost section ───────────────────────────────────────────
            let infracostData = {};
            try {
              infracostData = JSON.parse(fs.readFileSync(`${base}/infracost.json`, 'utf8'));
            } catch (e) {}

            let table = `## Cost Estimate — ${cloud.toUpperCase()} (dev)\n\n`;

            // OPA plan cost result
            const planExit = '${{ steps.opa_plan_cost.outputs.exit_code }}';
            const infracostExit = '${{ steps.opa_cost.outputs.exit_code }}';

            const planStatus = planExit === '0' ? '✅ Within budget' : '❌ Over budget';
            const infraStatus = infracostExit === '0' ? '✅ Within budget' : '❌ Over budget';

            table += `| Check | Result |\n|-------|--------|\n`;
            table += `| OPA (terraform plan estimate) | ${planStatus} |\n`;
            table += `| OPA (Infracost API pricing) | ${infraStatus} |\n\n`;

            // Infracost breakdown table
            table += `### Infracost Breakdown\n\n`;
            table += `| Resource | Monthly Cost | Status |\n`;
            table += `|----------|-------------|--------|\n`;

            const projects = infracostData.projects || [];
            let hasResources = false;
            for (const project of projects) {
              const resources = project?.breakdown?.resources || [];
              for (const res of resources) {
                hasResources = true;
                const cost = parseFloat(res.monthlyCost || 0).toFixed(2);
                const status = parseFloat(cost) > 8 ? '⚠️ High' : '✅ OK';
                table += `| \`${res.name}\` | $${cost} | ${status} |\n`;
              }
            }
            if (!hasResources) table += `| _No data (Infracost may not have run)_ | — | — |\n`;

            const total = parseFloat(infracostData.totalMonthlyCost || 0).toFixed(2);
            table += `\n**Total (Infracost): $${total}/month** | Budget limit: $22/month\n`;

            // OPA plan cost violations
            let opaSection = '';
            try {
              const opaData = JSON.parse(fs.readFileSync(`${base}/opa_plan_result.json`, 'utf8'));
              const failures = opaData.flatMap(r => r.failures || []);
              const warnings = opaData.flatMap(r => r.warnings || []);
              if (failures.length > 0 || warnings.length > 0) {
                opaSection += `\n### OPA Plan Cost Findings\n\n`;
                for (const f of failures) opaSection += `> ❌ ${f.msg}\n\n`;
                for (const w of warnings) opaSection += `> ⚠️ ${w.msg}\n\n`;
              }
            } catch (e) {}
            table += opaSection;

            table += `\n_Deploy-destroy pattern: compute costs estimated at 88 hrs/month (4 hrs/day × 22 days)_`;

            if (context.issue?.number) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: table
              });
            }

      - name: Fail if OPA cost policy denied
        if: steps.opa_plan_cost.outputs.exit_code != '0' || steps.opa_cost.outputs.exit_code != '0'
        run: |
          echo "OPA cost guard triggered a DENY. See PR comment for details."
          echo "  opa_plan_cost exit: ${{ steps.opa_plan_cost.outputs.exit_code }}"
          echo "  opa_infracost exit: ${{ steps.opa_cost.outputs.exit_code }}"
          exit 1
