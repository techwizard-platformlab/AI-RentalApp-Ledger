name: Cost Check (OPA)

# Runs on every PR that touches infrastructure or cost policies.
# Estimates monthly cost from the terraform plan JSON — no external API needed.
# Uses OPA (conftest) with tf_plan_cost.rego: deny > $22/month, warn $15-$22.

on:
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/**"
      - "platform/security/policies/cost/**"
  workflow_dispatch:
    inputs:
      cloud:
        description: "Target cloud"
        required: true
        default: "azure"
        type: choice
        options: [azure, gcp]

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  DISCORD_WEBHOOK_URL: ""         # populated at runtime from Key Vault (azure only)
  ARM_USE_AZUREAD_AUTH: "true"

jobs:
  cost-check:
    name: OPA Cost Check (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PR trigger always runs Azure; workflow_dispatch uses the user's selection
        cloud: ${{ fromJSON(format('["{0}"]', inputs.cloud || 'azure')) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # ── Auth ──────────────────────────────────────────────────────────────────
      - name: Azure login (OIDC)
        if: matrix.cloud == 'azure'
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a  # v3
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        if: matrix.cloud == 'azure'
        run: |
          KV="techwizard-plt-kv"
          DISCORD=$(az keyvault secret show --vault-name "$KV" --name "rentalapp-discord-webhook" --query value -o tsv 2>/dev/null || true)
          if [[ -n "$DISCORD" ]]; then
            echo "::add-mask::$DISCORD"
            echo "DISCORD_WEBHOOK_URL=$DISCORD" >> "$GITHUB_ENV"
          fi

      - name: GCP login (OIDC)
        if: matrix.cloud == 'gcp'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Terraform plan → JSON ─────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4
        with:
          terraform_version: 1.9.0

      - name: Terraform init + plan
        working-directory: infrastructure/${{ matrix.cloud }}/environments/dev
        env:
          ARM_USE_OIDC:        "true"
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_env_resource_group_name:    "my-Rental-App-Dev"
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=rentalapp-dev-tfstate"
          terraform plan -out=tfplan
          terraform show -json tfplan > plan.json
          echo "Plan generated: $(wc -l < plan.json) lines"

      # ── Install conftest ──────────────────────────────────────────────────────
      - name: Install conftest
        run: |
          CONFTEST_VERSION=v0.50.0
          wget -qO conftest.tar.gz \
            "https://github.com/open-policy-agent/conftest/releases/download/${CONFTEST_VERSION}/conftest_0.50.0_Linux_x86_64.tar.gz"
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

      # ── OPA: cost estimation from terraform plan JSON ─────────────────────────
      - name: OPA cost check
        id: opa_cost
        working-directory: infrastructure/${{ matrix.cloud }}/environments/dev
        run: |
          set +e
          conftest test plan.json \
            --namespace cost_tfplan \
            --policy ../../../../platform/security/policies/cost/tf_plan_cost.rego \
            --output json > opa_result.json 2>&1
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          echo "=== OPA Cost Result ==="
          python3 - <<'EOF'
          import json, sys
          try:
              data = json.load(open("opa_result.json"))
          except Exception as e:
              print(f"Could not parse result: {e}"); sys.exit(0)
          for result in data:
              for f in result.get("failures", []):
                  print(f"  DENY: {f['msg']}")
              for w in result.get("warnings", []):
                  print(f"  WARN: {w['msg']}")
          if not any(r.get("failures") or r.get("warnings") for r in data):
              print("  OK: estimated cost is within budget")
          EOF
          set -e

      # ── Write job summary ─────────────────────────────────────────────────────
      - name: Write step summary
        if: always()
        working-directory: infrastructure/${{ matrix.cloud }}/environments/dev
        run: |
          STATUS="${{ steps.opa_cost.outputs.exit_code == '0' && '✅ Within budget' || '❌ Over budget' }}"
          echo "## ${STATUS} — OPA Cost Check (${{ matrix.cloud }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Budget limit: **\$22/month** (deploy-destroy, 88 hrs/month)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          python3 - >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          import json
          try:
              data = json.load(open("opa_result.json"))
          except Exception:
              print("_No result data_"); exit(0)
          failures = [f for r in data for f in r.get("failures", [])]
          warnings = [w for r in data for w in r.get("warnings", [])]
          if failures:
              print("### Deny\n")
              for f in failures: print(f"> {f['msg']}\n")
          if warnings:
              print("### Warnings\n")
              for w in warnings: print(f"> {w['msg']}\n")
          if not failures and not warnings:
              print("All cost checks passed.")
          EOF

      # ── PR comment ───────────────────────────────────────────────────────────
      - name: Post PR comment
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553  # v9
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const cloud = '${{ matrix.cloud }}';
            const exitCode = '${{ steps.opa_cost.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ Within budget' : '❌ Over budget';

            let body = `## ${status} — Cost Check (${cloud.toUpperCase()})\n\n`;
            body += `Budget: **$22/month** | Pattern: deploy-destroy (88 hrs/month)\n\n`;

            try {
              const data = JSON.parse(
                fs.readFileSync(`infrastructure/${cloud}/environments/dev/opa_result.json`, 'utf8')
              );
              const failures = data.flatMap(r => r.failures || []);
              const warnings = data.flatMap(r => r.warnings || []);

              if (failures.length) {
                body += `### Denied\n`;
                for (const f of failures) body += `> ❌ ${f.msg}\n\n`;
              }
              if (warnings.length) {
                body += `### Warnings\n`;
                for (const w of warnings) body += `> ⚠️ ${w.msg}\n\n`;
              }
              if (!failures.length && !warnings.length) {
                body += `All resources are within cost limits.\n`;
              }
            } catch (e) {
              body += `_Could not read OPA result._\n`;
            }

            if (context.issue?.number) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      # ── Discord ──────────────────────────────────────────────────────────────
      - name: Notify Discord
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708  # v1
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          status: ${{ steps.opa_cost.outputs.exit_code == '0' && 'success' || 'failure' }}
          title: "Cost Check (${{ matrix.cloud }}) — OPA ${{ steps.opa_cost.outputs.exit_code == '0' && 'Within Budget' || 'Over Budget' }}"

      # ── Gate ─────────────────────────────────────────────────────────────────
      - name: Fail if cost denied
        if: steps.opa_cost.outputs.exit_code != '0'
        run: |
          echo "OPA cost check DENIED. Reduce resource sizes or node counts."
          exit 1
