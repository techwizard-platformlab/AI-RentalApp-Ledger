name: "Infra Schedule"

# Deploy-destroy lifecycle automation:
#   Destroy: Sunday 18:00 UTC (23:30 IST) — end of weekend session
#   Recreate: Saturday 02:00 UTC (07:30 IST) — ready for weekend session
on:
  # Schedule triggers disabled during testing — enable after workflow is stable
  # schedule:
  #   - cron: "0 18 * * 0"   # Sunday  18:00 UTC → destroy
  #   - cron: "0 2  * * 6"   # Saturday 02:00 UTC → recreate
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options: [destroy, recreate]
      cloud:
        description: "Which cloud"
        required: true
        default: "both"
        type: choice
        options: [azure, gcp, both]
      confirm:
        description: "For destroy: type 'destroy' to confirm"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.5.7"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Determine which action to run based on trigger
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: "Determine action"
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.resolve.outputs.action }}
      run_azure: ${{ steps.resolve.outputs.run_azure }}
      run_gcp: ${{ steps.resolve.outputs.run_gcp }}
    steps:
      - name: Validate manual destroy confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "❌ Type 'destroy' in the confirm field to proceed"
            exit 1
          fi

      - name: Resolve action + cloud targets
        id: resolve
        run: |
          # Schedule: Sunday = destroy, Saturday = recreate
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DAY=$(date -u +%A)
            echo "action=$([ '$DAY' = 'Sunday' ] && echo destroy || echo recreate)" >> $GITHUB_OUTPUT
            echo "run_azure=true" >> $GITHUB_OUTPUT
            echo "run_gcp=true"   >> $GITHUB_OUTPUT
          else
            echo "action=${{ github.event.inputs.action }}"                                  >> $GITHUB_OUTPUT
            echo "run_azure=$([ '${{ github.event.inputs.cloud }}' != 'gcp' ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "run_gcp=$([ '${{ github.event.inputs.cloud }}' != 'azure' ] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Azure — destroy or recreate
  # ─────────────────────────────────────────────────────────────────────────────
  azure:
    name: "Azure · dev · ${{ needs.setup.outputs.action }}"
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_azure == 'true'
    environment: azure-dev

    defaults:
      run:
        working-directory: infrastructure/azure/environments/dev

    env:
      ARM_USE_OIDC:               "true"
      ARM_CLIENT_ID:              ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:              ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID:        ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_resource_group_name: ${{ secrets.AZURE_RESOURCE_GROUP }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure OIDC login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5  # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy
        id: destroy
        if: needs.setup.outputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Terraform apply (recreate)
        id: apply
        if: needs.setup.outputs.action == 'recreate'
        run: terraform apply -auto-approve -no-color

      - name: Notify Discord
        if: always()
        uses: Ilshidur/action-discord@d2594079a10f1d6739ee50a2471f0ca57418b554  # master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            ${{ (steps.destroy.outcome == 'success' || steps.apply.outcome == 'success') && '✅' || '❌' }} **Azure dev ${{ needs.setup.outputs.action }}** completed
            Triggered: `${{ github.event_name }}` | Commit: `${{ github.sha }}`

  # ─────────────────────────────────────────────────────────────────────────────
  # GCP — destroy or recreate
  # ─────────────────────────────────────────────────────────────────────────────
  gcp:
    name: "GCP · dev · ${{ needs.setup.outputs.action }}"
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_gcp == 'true'
    environment: gcp-dev

    defaults:
      run:
        working-directory: infrastructure/gcp/environments/dev

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: GCP OIDC login
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy
        id: destroy
        if: needs.setup.outputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Terraform apply (recreate)
        id: apply
        if: needs.setup.outputs.action == 'recreate'
        run: terraform apply -auto-approve -no-color

      - name: Notify Discord
        if: always()
        uses: Ilshidur/action-discord@d2594079a10f1d6739ee50a2471f0ca57418b554  # master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          args: |
            ${{ (steps.destroy.outcome == 'success' || steps.apply.outcome == 'success') && '✅' || '❌' }} **GCP dev ${{ needs.setup.outputs.action }}** completed
            Triggered: `${{ github.event_name }}` | Commit: `${{ github.sha }}`
