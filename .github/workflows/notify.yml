# Reusable notification workflow — Discord + optional email
# Usage (caller workflow):
#   jobs:
#     notify:
#       uses: ./.github/workflows/notify.yml
#       with:
#         event_type: deployment
#         status: success
#         message: "api-gateway deployed to dev"
#         environment: dev
#       secrets: inherit
on:
  workflow_call:
    inputs:
      event_type:
        description: "Event type: deployment | qa | opa | pod_restart | cost"
        required: true
        type: string
      status:
        description: "Status: success | failure | warning | info"
        required: true
        type: string
      message:
        description: "Human-readable message body"
        required: true
        type: string
      environment:
        description: "Target environment: dev | qa | prod"
        required: false
        type: string
        default: dev
      send_email:
        description: "Also send email (true/false)"
        required: false
        type: boolean
        default: false
      workflow_run_url:
        description: "Link to the triggering workflow run"
        required: false
        type: string
        default: ""
    secrets:
      DISCORD_WEBHOOK_URL:
        required: true
      SMTP_PASSWORD:
        required: false
      MAIL_TO:
        required: false

jobs:
  discord:
    name: Discord Notification
    runs-on: ubuntu-latest
    steps:
      - name: Map status to Discord colour and emoji
        id: meta
        run: |
          case "${{ inputs.status }}" in
            success) COLOR=3066993;  EMOJI="✅" ;;
            failure) COLOR=15158332; EMOJI="❌" ;;
            warning) COLOR=16776960; EMOJI="⚠️"  ;;
            info)    COLOR=3447003;  EMOJI="ℹ️"  ;;
            *)       COLOR=9807270;  EMOJI="🔔"  ;;
          esac
          echo "color=$COLOR"   >> "$GITHUB_OUTPUT"
          echo "emoji=$EMOJI"   >> "$GITHUB_OUTPUT"

          # Human-friendly event type label
          case "${{ inputs.event_type }}" in
            deployment)  LABEL="Deployment"      ;;
            qa)          LABEL="QA / BDD Tests"  ;;
            opa)         LABEL="OPA Policy"      ;;
            pod_restart) LABEL="Pod Restart"     ;;
            cost)        LABEL="Cost Guard"      ;;
            *)           LABEL="${{ inputs.event_type }}" ;;
          esac
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Send Discord embed
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_URL="${{ inputs.workflow_run_url }}"
          if [[ -z "$RUN_URL" ]]; then
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "username": "rentalAppLedger Bot",
            "embeds": [{
              "title": "${{ steps.meta.outputs.emoji }} ${{ steps.meta.outputs.label }} — ${{ inputs.status | upper }}",
              "description": "${{ inputs.message }}",
              "color": ${{ steps.meta.outputs.color }},
              "fields": [
                {"name": "Environment", "value": "${{ inputs.environment }}", "inline": true},
                {"name": "Repository",  "value": "${{ github.repository }}",  "inline": true},
                {"name": "Ref",         "value": "${{ github.ref_name }}",    "inline": true},
                {"name": "Actor",       "value": "${{ github.actor }}",       "inline": true},
                {"name": "Run",         "value": "[View logs]($RUN_URL)",     "inline": true}
              ],
              "footer": {"text": "rentalAppLedger CI/CD"},
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          if [[ "$HTTP_CODE" != "204" ]]; then
            echo "Discord webhook returned HTTP $HTTP_CODE" >&2
            exit 1
          fi
          echo "Discord notification sent (HTTP $HTTP_CODE)"

  email:
    name: Email Notification
    runs-on: ubuntu-latest
    if: inputs.send_email == true
    steps:
      - name: Send email via Python smtplib
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python3 - <<'PYEOF'
          import os, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          status    = "${{ inputs.status }}"
          event     = "${{ inputs.event_type }}"
          message   = "${{ inputs.message }}"
          env       = "${{ inputs.environment }}"
          repo      = "${{ github.repository }}"
          actor     = "${{ github.actor }}"
          run_id    = "${{ github.run_id }}"
          run_url   = f"https://github.com/{repo}/actions/runs/{run_id}"

          header_color = {"success": "#27ae60", "failure": "#e74c3c",
                          "warning": "#f39c12", "info": "#2980b9"}.get(status, "#7f8c8d")
          emoji        = {"success": "✅", "failure": "❌",
                          "warning": "⚠️", "info": "ℹ️"}.get(status, "🔔")

          html = f"""
          <html><body style="font-family:sans-serif;background:#f4f4f4;padding:20px">
          <div style="max-width:600px;margin:auto;background:#fff;border-radius:8px;overflow:hidden">
            <div style="background:{header_color};padding:20px;color:#fff">
              <h2 style="margin:0">{emoji} rentalAppLedger — {event.replace('_',' ').title()}</h2>
              <p style="margin:4px 0;opacity:.9">Status: <strong>{status.upper()}</strong></p>
            </div>
            <div style="padding:24px">
              <p>{message}</p>
              <table style="border-collapse:collapse;width:100%">
                <tr><td style="padding:6px;font-weight:bold;width:140px">Environment</td><td style="padding:6px">{env}</td></tr>
                <tr><td style="padding:6px;font-weight:bold">Repository</td><td style="padding:6px">{repo}</td></tr>
                <tr><td style="padding:6px;font-weight:bold">Actor</td><td style="padding:6px">{actor}</td></tr>
                <tr><td style="padding:6px;font-weight:bold">Workflow run</td>
                    <td style="padding:6px"><a href="{run_url}">{run_url}</a></td></tr>
              </table>
            </div>
            <div style="background:#f4f4f4;padding:12px;text-align:center;font-size:12px;color:#888">
              rentalAppLedger automated alert
            </div>
          </div>
          </body></html>
          """

          smtp_host = os.getenv("SMTP_HOST", "smtp.gmail.com")
          smtp_port = int(os.getenv("SMTP_PORT", "587"))
          smtp_user = os.getenv("SMTP_USERNAME", "alertmanager@rentalapp.io")
          smtp_pass = os.environ["SMTP_PASSWORD"]
          mail_to   = os.environ["MAIL_TO"]

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"[{status.upper()}] rentalAppLedger {event}: {message[:60]}"
          msg["From"]    = smtp_user
          msg["To"]      = mail_to
          msg.attach(MIMEText(html, "html"))

          with smtplib.SMTP(smtp_host, smtp_port) as server:
              server.starttls()
              server.login(smtp_user, smtp_pass)
              server.sendmail(smtp_user, mail_to, msg.as_string())

          print(f"Email sent to {mail_to}")
          PYEOF
