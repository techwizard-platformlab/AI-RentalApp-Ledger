apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rental-ledger-dev
  namespace: argocd
  labels:
    project: rentalAppLedger
    environment: dev
  annotations:
    # ArgoCD Image Updater: watch ACR and GCR for new image tags
    argocd-image-updater.argoproj.io/image-list: |
      api-gateway={ACR_NAME}.azurecr.io/api-gateway,
      rental-service={ACR_NAME}.azurecr.io/rental-service,
      ledger-service={ACR_NAME}.azurecr.io/ledger-service,
      notification-service={ACR_NAME}.azurecr.io/notification-service
    argocd-image-updater.argoproj.io/api-gateway.update-strategy: newest-build
    argocd-image-updater.argoproj.io/rental-service.update-strategy: newest-build
    argocd-image-updater.argoproj.io/ledger-service.update-strategy: newest-build
    argocd-image-updater.argoproj.io/notification-service.update-strategy: newest-build
    # Write back image tag as git commit (GitOps pattern)
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rental-ledger

  source:
    repoURL: "https://github.com/{org}/rentalAppLedger"
    targetRevision: main
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc   # AKS in-cluster
    namespace: rental-dev

  syncPolicy:
    automated:
      prune: true       # Delete resources removed from git
      selfHeal: true    # Revert manual cluster changes
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  # Revision history: keep last 5 for rollback
  revisionHistoryLimit: 5

  # Discord notification via ArgoCD Notifications
  info:
    - name: discord-channel
      value: "#deployments"
