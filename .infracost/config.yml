# Infracost configuration file
# Get a free API key: https://www.infracost.io/docs/#2-get-api-key
# Set as INFRACOST_API_KEY environment variable or GitHub secret

version: 0.1

projects:
  - path: infrastructure/azure/environments/dev
    name: azure-dev
    terraform_var_files:
      - terraform.tfvars

  - path: infrastructure/gcp/environments/dev
    name: gcp-dev
    terraform_var_files:
      - terraform.tfvars

# ─────────────────────────────────────────────────────────────────────────────
# Deploy-destroy cost pattern: 3-4 hrs/day × 22 working days = 88 hrs/month
# Budget: 400 INR (~$5 USD) per week per cloud
#
# Keep costs down:
# - Destroy AKS/GKE after each session (ci-cd/scripts/destroy-compute.sh)
# - ACR and SQL persist (cheap daily billing, data retained)
# - Run only ONE cloud at a time
# - OPA deny threshold: $22/month | warn: $15/month
# ─────────────────────────────────────────────────────────────────────────────
