apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: api-gateway-dr
  namespace: rental-dev
spec:
  host: api-gateway.rental-dev.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL   # enforce mTLS for all traffic to this host
    connectionPool:
      http:
        http1MaxPendingRequests: 10
        http2MaxRequests: 10
    outlierDetection:
      consecutive5xxErrors: 1       # eject after 1 consecutive error
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: v1
      labels:
        version: "1.0.0"
    # Canary subset — add new version here for traffic splitting
    - name: v2
      labels:
        version: "2.0.0"
