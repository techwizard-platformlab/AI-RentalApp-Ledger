apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: rental-service-dr
  namespace: rental-dev
spec:
  host: rental-service.rental-dev.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        http1MaxPendingRequests: 10
        http2MaxRequests: 10
    outlierDetection:
      consecutive5xxErrors: 1
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: v1
      labels:
        version: "1.0.0"
    - name: v2
      labels:
        version: "2.0.0"
