apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rental-qa
resources:
  - ../../base
patches:
  # EnvoyFilter must stay in istio-system
  - patch: |
      - op: replace
        path: /metadata/namespace
        value: istio-system
    target:
      kind: EnvoyFilter
      name: ingress-rate-limit
  # Patch auth policy principals and namespace refs from rental-dev → rental-qa
  - path: patches/auth-policies-patch.yaml
