---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-api-gateway-to-rag-api
spec:
  selector:
    matchLabels:
      app: rag-api
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/rental-dev/sa/api-gateway"
      to:
