apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-api-gateway
spec:
  selector:
    matchLabels:
      app: api-gateway
  rules:
    - from:
        - source:
            namespaces: ["istio-system"]
      to:
        - operation:
            methods: [GET, POST, PUT, DELETE, PATCH]
            paths: ["/api/*", "/healthz", "/admin/*", "/metrics"]

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-api-gateway-to-rental-service
spec:
  selector:
    matchLabels:
      app: rental-service
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/rental-dev/sa/api-gateway"
      to:
        - operation:
            methods: [GET, POST, PUT, DELETE]
            paths: ["/api/rental/*", "/health"]

