# PeerAuthentication — enforce STRICT mTLS across the namespace
# All service-to-service traffic must use Istio mutual TLS.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-strict-mtls
spec:
  mtls:
    mode: STRICT

---
# Health check probes come from kubelet (not through sidecar) — allow PERMISSIVE on health ports.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: api-gateway-health-permissive
spec:
  selector:
    matchLabels:
      app: api-gateway
  portLevelMtls:
    8000:
      mode: PERMISSIVE

