# ArgoCD Helm values — minimal install for KodeKloud dev constraints
# Install: helm repo add argo https://argoproj.github.io/argo-helm
#          helm install argocd argo/argo-cd -n argocd --create-namespace -f install-values.yaml

global:
  # Disable HA — single replica for learning environment
  ha:
    enabled: false

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      # Replace <cluster-ip> with actual AKS LoadBalancer IP
      - argocd.<cluster-ip>.nip.io
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.<cluster-ip>.nip.io
  # Expose metrics for Prometheus
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ArgoCD Notifications — installed as sub-chart
notifications:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Notification triggers and templates are in platform/gitops/argocd/apps/notification-config.yaml

# Disable unnecessary components to save resources
dex:
  enabled: false

configs:
  params:
    # Allow management of cluster-scoped resources
    server.insecure: false
    # Sync timeout
    timeout.reconciliation: 180s
