apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"  # install before ClusterSecretStore and ExternalSecrets
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.9.20"
    helm:
      values: |
        installCRDs: true
        serviceAccount:
          annotations:
            # Client ID of the ESO managed identity created by Terraform.
            # Update this value after running: terraform output -raw eso_client_id
            azure.workload.identity/client-id: "REPLACE_AFTER_TERRAFORM_APPLY"
        podLabels:
          azure.workload.identity/use: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
