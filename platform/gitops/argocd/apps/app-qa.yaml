apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rental-ledger-qa
  namespace: argocd
  labels:
    project: rentalAppLedger
    environment: qa
  annotations:
    # ArgoCD Image Updater: same ACR images as dev, QA branch write-back.
    # ACR_LOGIN_SERVER is patched by argocd-bootstrap workflow.
    argocd-image-updater.argoproj.io/image-list: >-
      rental-app-ledger=ACR_LOGIN_SERVER/rental-app-ledger,
      rental-rag-api=ACR_LOGIN_SERVER/rental-rag-api
    argocd-image-updater.argoproj.io/rental-app-ledger.update-strategy: newest-build
    argocd-image-updater.argoproj.io/rental-rag-api.update-strategy: newest-build
    # Write back to qa branch overlay kustomization.yaml
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: qa
    # Notifications
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: "rental-deployments"
    notifications.argoproj.io/subscribe.on-sync-failed.discord: "rental-deployments"
    notifications.argoproj.io/subscribe.on-health-degraded.discord: "rental-deployments"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rental-ledger

  source:
    repoURL: "https://github.com/techwizard-platformlab/AI-RentalApp-Ledger"
    targetRevision: qa            # track the qa branch
    path: platform/kubernetes/overlays/qa

  destination:
    server: https://kubernetes.default.svc
    namespace: rental-qa

  # QA: manual sync — human must click Sync in ArgoCD UI or run argocd app sync
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  revisionHistoryLimit: 5
