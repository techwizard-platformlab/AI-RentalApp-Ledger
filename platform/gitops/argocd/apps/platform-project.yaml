apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-addons
  namespace: argocd
  labels:
    project: rentalAppLedger
    tier: platform
spec:
  description: "Platform add-ons — Istio service mesh, Prometheus/Grafana observability stack"

  sourceRepos:
    - "https://github.com/techwizard-platformlab/AI-RentalApp-Ledger"
    - "https://istio-release.storage.googleapis.com/charts"
    - "https://prometheus-community.github.io/helm-charts"

  destinations:
    - namespace: istio-system
      server: https://kubernetes.default.svc
    - namespace: istio-cni
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc

  # Platform add-ons need cluster-scoped resources (CRDs, ClusterRoles, etc.)
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "admissionregistration.k8s.io"
      kind: MutatingWebhookConfiguration
    - group: "admissionregistration.k8s.io"
      kind: ValidatingWebhookConfiguration
    - group: "policy"
      kind: PodSecurityPolicy
    - group: "networking.istio.io"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  orphanedResources:
    warn: false   # Helm installs many resources; suppress noise
