# ArgoCD Notifications Secret — DO NOT commit with real values.
#
# Populate via kubectl (preferred):
#   kubectl create secret generic argocd-notifications-secret \
#     -n argocd \
#     --from-literal=discord-webhook-url="https://discord.com/api/webhooks/<id>/<token>"
#
# Or via Azure KeyVault CSI:
#   az keyvault secret set --vault-name <vault> \
#     --name discord-webhook-url --value "<url>"
#
# Or via GCP Secret Manager:
#   echo -n "<url>" | gcloud secrets create discord-webhook-url --data-file=-
#
# Apply template (replaces placeholder — CI/CD injects real value):
#   kubectl apply -f gitops/notifications/argocd-notifications-secret.yaml -n argocd
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  discord-webhook-url: "REPLACE_WITH_ACTUAL_WEBHOOK"
