apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  labels:
    project: rentalAppLedger
    tier: platform
    component: istio
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # Install CRDs first
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-addons

  source:
    repoURL: "https://istio-release.storage.googleapis.com/charts"
    chart: base
    targetRevision: "1.21.2"    # Istio 1.21 — stable LTS, compatible with AKS 1.28+
    helm:
      releaseName: istio-base
      values: |
        global:
          istioNamespace: istio-system

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # Required for Istio CRDs (large resource annotations)
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m

  revisionHistoryLimit: 3
