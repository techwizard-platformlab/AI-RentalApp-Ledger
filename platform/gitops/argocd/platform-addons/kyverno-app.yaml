apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  labels:
    project: rentalAppLedger
    tier: platform
    component: security
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # Apply after cluster is ready, before app deployments
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-addons

  source:
    repoURL: "https://github.com/techwizard-platformlab/AI-RentalApp-Ledger"
    targetRevision: main
    path: platform/security/kyverno

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m

  revisionHistoryLimit: 3
