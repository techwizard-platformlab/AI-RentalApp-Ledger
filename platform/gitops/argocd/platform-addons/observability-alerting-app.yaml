apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-alerting
  namespace: argocd
  labels:
    project: rentalAppLedger
    tier: platform
    component: alerting
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-addons

  source:
    repoURL: "https://github.com/techwizard-platformlab/AI-RentalApp-Ledger"
    targetRevision: main
    path: platform/observability/alerting/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 2m

  revisionHistoryLimit: 3
