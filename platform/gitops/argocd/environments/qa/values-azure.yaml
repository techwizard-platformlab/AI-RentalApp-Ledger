# platform/gitops/argocd/environments/qa/values-azure.yaml
# Azure-specific overrides for qa environment

environment: qa
cloud: azure
namespace: rental-qa

repoURL: "https://github.com/techwizard-platformlab/RentalApp-Build"
targetRevision: main

project:
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apps
      kind: Deployment
    - group: networking.istio.io
      kind: VirtualService

syncPolicy:
  automated:
    prune: true
    selfHeal: false   # manual reconcile in QA to protect test state
  syncOptions:
    - CreateNamespace=true

imageUpdater:
  enabled: true
  image: rental-api
  updateStrategy: semver
  registrySecret: acr-pull-secret

ignoreDifferences: []
