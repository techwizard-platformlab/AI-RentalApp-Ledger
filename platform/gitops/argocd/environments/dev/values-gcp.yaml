# Dev environment overrides — GCP
global:
  repoURL: "https://github.com/YOUR_ORG/YOUR_REPO"
  targetRevision: main

app:
  name: rental-ledger
  namespace: rental-dev
  environment: dev
  cloud: gcp
  project: rental-ledger
  manifestPath: "platform/kubernetes/overlays/dev"
  registryServer: "REGISTRY_URL"   # patched by bootstrap workflow
  sync:
    automated: true
    prune: true
    selfHeal: true
    createNamespace: true
  revisionHistoryLimit: 5

appProject:
  name: rental-ledger
  description: "Rental App Ledger — dev (GCP)"
  sourceRepos:
    - "https://github.com/YOUR_ORG/YOUR_REPO"
  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "rental-dev"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceBlacklist:
    - group: ""
      kind: ResourceQuota
