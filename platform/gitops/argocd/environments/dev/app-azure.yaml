apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rental-ledger-dev
  namespace: argocd
  labels:
    project: rentalAppLedger
    environment: dev
    cloud: azure
  annotations:
    # ArgoCD Image Updater: watch ACR for new image tags on every CI push.
    # ACR_LOGIN_SERVER is patched by argocd-bootstrap workflow (e.g. myacr.azurecr.io).
    # rental-app-ledger  — Django monorepo image (api-gateway, rental, ledger, notification)
    # rental-rag-api     — FastAPI RAG service image
    argocd-image-updater.argoproj.io/image-list: >-
      rental-app-ledger=ACR_LOGIN_SERVER/rental-app-ledger,
      rental-rag-api=ACR_LOGIN_SERVER/rental-rag-api
    argocd-image-updater.argoproj.io/rental-app-ledger.update-strategy: newest-build
    argocd-image-updater.argoproj.io/rental-rag-api.update-strategy: newest-build
    # Write back image tag as git commit so the overlay kustomization.yaml stays in sync
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    # Notifications
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: "rental-deployments"
    notifications.argoproj.io/subscribe.on-sync-failed.discord: "rental-deployments"
    notifications.argoproj.io/subscribe.on-health-degraded.discord: "rental-deployments"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rental-ledger

  source:
    repoURL: "https://github.com/techwizard-platformlab/AI-RentalApp-Ledger"
    targetRevision: main
    path: platform/kubernetes/overlays/dev

  destination:
    server: https://kubernetes.default.svc   # AKS in-cluster
    namespace: rental-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  revisionHistoryLimit: 5
