# platform/gitops/argocd/values/argocd-install.yaml
# ArgoCD Helm install values — used by argocd-bootstrap.yml
# helm upgrade --install argocd argo/argo-cd --values this-file

global:
  image:
    tag: "v2.11.0"

server:
  extraArgs:
    - --insecure   # TLS terminated at Istio/LB layer
  service:
    type: LoadBalancer
  autoscaling:
    enabled: false

repoServer:
  autoscaling:
    enabled: false

applicationSet:
  enabled: true

notifications:
  enabled: true

configs:
  params:
    server.insecure: true
  cm:
    # Dex disabled — using GitHub PAT repo registration
    dex.config: ""
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs

redis:
  enabled: true
