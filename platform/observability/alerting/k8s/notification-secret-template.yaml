# notification-secret-template.yaml
# DO NOT commit with real values — fill via kubectl or CI/CD.
#
# Azure KeyVault: az keyvault secret set --vault-name <vault> --name discord-webhook-url --value <url>
# GCP Secret Manager: gcloud secrets create discord-webhook-url --data-file=<(echo -n '<url>')
#
# Apply: kubectl create secret generic notification-secret \
#   -n monitoring \
#   --from-literal=discord-webhook-url="<your-discord-webhook>" \
#   --from-literal=smtp-password="<your-smtp-password>" \
#   --from-literal=mail-to="your@email.com"
apiVersion: v1
kind: Secret
metadata:
  name: notification-secret
  namespace: monitoring
type: Opaque
stringData:
  discord-webhook-url: "REPLACE_WITH_ACTUAL_WEBHOOK"
  smtp-password: "REPLACE_WITH_SMTP_PASSWORD"
  mail-to: "REPLACE_WITH_EMAIL"
