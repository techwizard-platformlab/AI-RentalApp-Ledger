# Grafana sidecar auto-loads this dashboard because of the label grafana_dashboard=1
# The sidecar watches all namespaces (searchNamespace: ALL in prometheus-values.yaml)
# and mounts JSON files from ConfigMaps into Grafana's dashboard provider path.
#
# How it works:
# 1. Grafana sidecar detects ConfigMap with label grafana_dashboard=1
# 2. Copies the JSON to /tmp/dashboards/ inside the Grafana pod
# 3. Grafana dashboard provider reloads from that path
#
# !! DO NOT EDIT THIS FILE DIRECTLY !!
# This ConfigMap is generated from rentalapp-slo-dashboard.json.
# To update the dashboard, edit rentalapp-slo-dashboard.json and re-run:
#   kubectl create configmap rentalapp-slo-dashboard \
#     -n monitoring \
#     --from-file=rentalapp-slo-dashboard.json=monitoring/dashboards/rentalapp-slo-dashboard.json \
#     --dry-run=client -o yaml | kubectl apply -f -
# Or use the helper: bash monitoring/dashboards/apply-dashboards.sh
apiVersion: v1
kind: ConfigMap
metadata:
  name: rentalapp-slo-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"   # triggers sidecar auto-load
    app: rentalAppLedger
    project: rentalAppLedger
# NOTE: This file is a manifest placeholder. The actual JSON content is embedded
# by running apply-dashboards.sh which uses --from-file to inject the JSON.
# Committing the raw JSON inline here would cause excessive git diff noise on
# every dashboard edit — the script approach is intentional.
