apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ledger-service-sm
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: ledger-service
    project: rentalAppLedger
spec:
  selector:
    matchLabels:
      app: ledger-service
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - rental-dev
      - rental-qa
