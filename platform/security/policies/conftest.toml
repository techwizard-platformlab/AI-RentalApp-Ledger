# conftest.toml — Conftest configuration for rentalAppLedger
# https://www.conftest.dev/configuration/

# Policy directories to load
policy = ["platform/security/policies/azure", "platform/security/policies/gcp", "platform/security/policies/shared", "platform/security/policies/cost", "platform/security/policies/pr"]

# Output format (stdout, json, tap, table)
output = "stdout"

# Namespace to use when multiple packages are loaded
# Override per-run with: conftest test --namespace azure plan.json
namespace = "main"

# Fail on warnings as well (set to false to treat warns as non-blocking)
fail_on_warn = false

# Data directory (approved_skus.json, etc.)
data = ["platform/security/policies/data"]

# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#
# 1. Generate terraform plan JSON:
#    terraform init
#    terraform plan -out=tfplan
#    terraform show -json tfplan > plan.json
#
# 2. Run conftest against Azure plan:
#    conftest test plan.json --namespace azure --policy platform/security/policies/azure/
#
# 3. Run conftest against GCP plan:
#    conftest test plan.json --namespace gcp --policy platform/security/policies/gcp/
#
# 4. Run all policies:
#    conftest test plan.json --policy platform/security/policies/
#
# 5. Run OPA unit tests:
#    conftest verify --policy platform/security/policies/azure/
#    conftest verify --policy platform/security/policies/gcp/
#    conftest verify --policy platform/security/policies/shared/
#
# Note: warn[] rules are NON-BLOCKING (exit code 0) and should be surfaced
# as PR comments. deny[] rules trigger exit code 1 and fail the pipeline.
# ─────────────────────────────────────────────────────────────────────────────
