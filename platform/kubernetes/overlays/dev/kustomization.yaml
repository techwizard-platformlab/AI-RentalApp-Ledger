apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rental-dev

resources:
  - ../../base/api-gateway
  - ../../base/rental-service
  - ../../base/ledger-service
  - ../../base/notification-service

labels:
  - pairs:
      environment: dev
    includeSelectors: false

# placeholder.azurecr.io is a syntactically valid image reference (lowercase, dots)
# that the argocd-bootstrap workflow replaces with the real ACR login server on each deploy.
# The sed pattern matches [a-z0-9]+\.azurecr\.io so this placeholder is always substituted.
# Pods will be in ImagePullBackOff until bootstrap runs — that is expected.
images:
  - name: rental-app-ledger
    newName: placeholder.azurecr.io/rental-app-ledger
    newTag: latest
