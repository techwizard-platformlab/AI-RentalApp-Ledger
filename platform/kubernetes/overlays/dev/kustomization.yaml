apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rental-dev

resources:
  - namespace.yaml
  - ../../base/api-gateway
  - ../../base/rental-service
  - ../../base/ledger-service
  - ../../base/notification-service
  - ../../base/rag-api

# Apply environment label to all resources
labels:
  - pairs:
      environment: dev
    includeSelectors: false
    includeTemplates: true

# Image tags — updated by ArgoCD Image Updater after each CI push
images:
  - name: rental-app-ledger
    newName: deveus2acrzwtbhs.azurecr.io/rental-app-ledger
    newTag: latest
  - name: rental-rag-api
    newName: deveus2acrzwtbhs.azurecr.io/rental-rag-api
    newTag: latest

# Env-specific patches — configmaps, resource tuning
patches:
  # ── api-gateway config ─────────────────────────────────────────────────────
  - path: patches/api-gateway-config.yaml
    target:
      kind: ConfigMap
      name: api-gateway-config

  # ── rental-service config ──────────────────────────────────────────────────
  - path: patches/rental-service-config.yaml
    target:
      kind: ConfigMap
      name: rental-service-config

  # ── ledger-service config ──────────────────────────────────────────────────
  - path: patches/ledger-service-config.yaml
    target:
      kind: ConfigMap
      name: ledger-service-config

  # ── notification-service config ────────────────────────────────────────────
  - path: patches/notification-service-config.yaml
    target:
      kind: ConfigMap
      name: notification-service-config

  # ── rag-api config ─────────────────────────────────────────────────────────
  - path: patches/rag-api-config.yaml
    target:
      kind: ConfigMap
      name: rag-api-config

  # ── ingress: dev hostname ──────────────────────────────────────────────────
  - path: patches/ingress-dev.yaml
    target:
      kind: Ingress
      name: api-gateway-ingress
