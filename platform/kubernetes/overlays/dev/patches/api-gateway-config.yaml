apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
data:
  ENVIRONMENT: "dev"
  LOG_LEVEL: "DEBUG"
  DJANGO_SETTINGS_MODULE: "config.settings.dev"
  # Intra-cluster service URLs — uses rental-dev namespace
  RENTAL_SERVICE_URL: "http://rental-service.rental-dev.svc.cluster.local:8001"
  LEDGER_SERVICE_URL: "http://ledger-service.rental-dev.svc.cluster.local:8002"
  NOTIFICATION_SERVICE_URL: "http://notification-service.rental-dev.svc.cluster.local:8003"
  RAG_API_URL: "http://rag-api.rental-dev.svc.cluster.local:8004"
  # Dev-permissive settings
  ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000"
  DEBUG: "true"
  GUNICORN_WORKERS: "1"
