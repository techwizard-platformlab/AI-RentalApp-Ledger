apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-service-config
  labels:
    app: ledger-service
    project: rentalAppLedger
data:
  LOG_LEVEL: "INFO"
  DJANGO_SETTINGS_MODULE: "config.settings"
  ALLOWED_HOSTS: "ledger-service,ledger-service.rental-dev.svc.cluster.local,localhost,127.0.0.1"
  SERVICE_PORT: "8002"
  GUNICORN_WORKERS: "2"
  GUNICORN_TIMEOUT: "60"
  # Report generation settings
  REPORT_PAGE_SIZE: "100"
  LEDGER_OVERDUE_GRACE_DAYS: "5"
