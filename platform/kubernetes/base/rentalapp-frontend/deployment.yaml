apiVersion: apps/v1
kind: Deployment
metadata:
  name: rentalapp-frontend
  labels:
    app: rentalapp-frontend
    project: rentalAppLedger
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rentalapp-frontend
  template:
    metadata:
      labels:
        app: rentalapp-frontend
        project: rentalAppLedger
    spec:
      serviceAccountName: rentalapp-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        nodepool: appnode
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: rentalapp-frontend
          image: rentalapp-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          # BACKEND_URL is injected at runtime from ConfigMap — no rebuild needed on IP change
          envFrom:
            - configMapRef:
                name: rentalapp-frontend-config
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 10
            periodSeconds: 5
          volumeMounts:
            - mountPath: /tmp
              name: tmp-dir
      volumes:
        - name: tmp-dir
          emptyDir: {}
