apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  labels:
    app: rag-api
    project: rentalAppLedger
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
        project: rentalAppLedger
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rag-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        nodepool: appnode
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: rag-api
          # Built from apps/ai-engine/rag/ — separate image from Django services
          image: rental-rag-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8004
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rag-api-config
            - secretRef:
                name: rag-api-secret
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # ChromaDB writes to /chroma volume
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - mountPath: /tmp
              name: tmp-dir
            - mountPath: /chroma
              name: chroma-data
      volumes:
        - name: tmp-dir
          emptyDir: {}
        - name: chroma-data
          emptyDir: {}
          # For production: replace emptyDir with a PVC for vector persistence
