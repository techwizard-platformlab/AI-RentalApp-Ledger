apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-api-config
  labels:
    app: rag-api
    project: rentalAppLedger
data:
  LOG_LEVEL: "INFO"
  SERVICE_PORT: "8004"
  # ChromaDB local path inside container
  CHROMA_PERSIST_DIR: "/chroma"
  CHROMA_COLLECTION_NAME: "rental_ledger"
  # Embedding model (runs locally, no API key)
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  # LLM provider priority: ollama → groq → anthropic
  # LLM_PROVIDER and API keys come from rag-api-secret
  LLM_PROVIDER: "groq"
  # Rate limiting
  RATE_LIMIT_PER_MINUTE: "10"
  # Indexer schedule — CronJob interval for re-indexing ledger data
  INDEX_BATCH_SIZE: "100"
