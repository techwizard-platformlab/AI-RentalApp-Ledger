apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-api-config
  labels:
    app: rag-api
    project: rentalAppLedger
data:
  LOG_LEVEL: "INFO"
  # Port is hardcoded in Dockerfile CMD (uvicorn --port 8080) — this is informational only
  SERVICE_PORT: "8080"
  # ChromaDB local path inside container — must match volume mountPath
  CHROMA_PATH: "/chroma"
  CHROMA_COLLECTION: "rental_ledger"
  # Embedding model (runs locally, no API key)
  EMBED_MODEL: "all-MiniLM-L6-v2"
  # LLM provider: ollama | groq | openai | claude
  # LLM_PROVIDER and API keys come from rag-api-secret
  LLM_PROVIDER: "openai"
  OPENAI_MODEL: "gpt-4o-mini"
  # Rate limiting
  RATE_LIMIT_PER_MINUTE: "10"
  # Indexer schedule — CronJob interval for re-indexing ledger data
  INDEX_BATCH_SIZE: "100"
