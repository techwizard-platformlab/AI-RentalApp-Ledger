apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rag-api-secret
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: rag-api-secret
    creationPolicy: Owner
  data:
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: groq-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: anthropic-api-key
    - secretKey: DB_HOST
      remoteRef:
        key: db-host
    - secretKey: DB_NAME
      remoteRef:
        key: db-name
    - secretKey: DB_USER
      remoteRef:
        key: db-user
    - secretKey: DB_PASSWORD
      remoteRef:
        key: db-password
    - secretKey: DB_PORT
      remoteRef:
        key: db-port
