apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  labels:
    app: api-gateway
    project: rentalAppLedger
data:
  # Overridden per environment via overlay patches
  LOG_LEVEL: "INFO"
  DJANGO_SETTINGS_MODULE: "config.settings"
  ALLOWED_HOSTS: "api-gateway,api-gateway.rental-dev.svc.cluster.local,localhost,127.0.0.1"
  # DB connection — values injected from api-gateway-secret (Key Vault)
  DB_PORT: "5432"
  # Service discovery — patched per overlay with correct namespace
  RENTAL_SERVICE_URL: ""
  LEDGER_SERVICE_URL: ""
  NOTIFICATION_SERVICE_URL: ""
  RAG_API_URL: ""
  # App config
  GUNICORN_WORKERS: "2"
  GUNICORN_TIMEOUT: "60"
