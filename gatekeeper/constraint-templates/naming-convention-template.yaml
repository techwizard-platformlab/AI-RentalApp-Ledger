apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: enforcenaming convention
  annotations:
    description: >-
      Enforces naming conventions for Deployments and Services.
      Deployment names must match: {service}-{env}-{version}
      Service names must match: svc-{name}
      Regex patterns are configurable via constraint parameters.
spec:
  crd:
    spec:
      names:
        kind: EnforceNamingConvention
      validation:
        openAPIV3Schema:
          type: object
          properties:
            deploymentRegex:
              type: string
              description: "Regex for Deployment names. Default: ^[a-z0-9]+-[a-z]+-[0-9]+\\.[0-9]+\\.[0-9]+$"
            serviceRegex:
              type: string
              description: "Regex for Service names. Default: ^svc-[a-z0-9-]+$"

  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package enforcenaming convention

        import future.keywords.if

        default deployment_regex := "^[a-z0-9]+-[a-z]+-v[0-9]+$"
        default service_regex    := "^svc-[a-z0-9-]+$"

        violation[{"msg": msg}] {
          input.review.object.kind == "Deployment"
          name := input.review.object.metadata.name
          regex_pattern := object.get(input.parameters, "deploymentRegex", deployment_regex)
          not regex.match(regex_pattern, name)
          msg := sprintf(
            "Deployment name '%s' does not match required pattern '%s'. Expected format: {service}-{env}-v{version} (e.g. rental-service-dev-v1)",
            [name, regex_pattern]
          )
        }

        violation[{"msg": msg}] {
          input.review.object.kind == "Service"
          name := input.review.object.metadata.name
          regex_pattern := object.get(input.parameters, "serviceRegex", service_regex)
          not regex.match(regex_pattern, name)
          msg := sprintf(
            "Service name '%s' does not match required pattern '%s'. Expected format: svc-{name} (e.g. svc-rental)",
            [name, regex_pattern]
          )
        }
