apiVersion: constraints.gatekeeper.sh/v1beta1
kind: ReplicaLimit
metadata:
  name: replica-limit-qa
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [apps]
        kinds: [Deployment]
      - apiGroups: [autoscaling]
        kinds: [HorizontalPodAutoscaler]
    namespaces:
      - rental-qa
  parameters:
    maxReplicas: 3   # qa: slightly more headroom
