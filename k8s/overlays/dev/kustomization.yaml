apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rental-dev

resources:
  - ../../base/api-gateway
  - ../../base/rental-service
  - ../../base/ledger-service
  - ../../base/notification-service

commonLabels:
  environment: dev

# Registry prefix is injected here by argocd-bootstrap workflow on each deploy.
# deveusacrjek7wu.azurecr.io placeholder is replaced with the real ACR URL (e.g. deveusacrabc.azurecr.io).
# ArgoCD Image Updater then keeps the tag up to date after each CI push.
images:
  - name: rental-app-ledger
    newName: deveusacrjek7wu.azurecr.io/rental-app-ledger
    newTag: latest
