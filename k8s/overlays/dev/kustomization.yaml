apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rental-dev

resources:
  - ../../base/api-gateway
  - ../../base/rental-service
  - ../../base/ledger-service
  - ../../base/notification-service

commonLabels:
  environment: dev

# ACR_LOGIN_SERVER is a placeholder replaced by the argocd-bootstrap workflow on each deploy.
# The workflow uses sed to substitute it with the real ACR login server URL.
# Never commit a hardcoded *.azurecr.io URL here — always use the placeholder.
images:
  - name: rental-app-ledger
    newName: ACR_LOGIN_SERVER/rental-app-ledger
    newTag: latest
