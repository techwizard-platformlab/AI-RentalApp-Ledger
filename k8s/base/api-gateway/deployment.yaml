apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rental-dev
  labels:
    app: api-gateway
    version: "1.0.0"
    environment: dev
    project: rentalAppLedger
  annotations:
    # ArgoCD sync wave - deploy after configmaps/secrets
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1   # dev: 1; qa overlay patches to 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: "1.0.0"
        environment: dev
        project: rentalAppLedger
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          # Image pushed by RentalApp CI → ACR. Tag updated by ArgoCD Image Updater.
          image: "ACR_LOGIN_SERVER/rental-app-ledger:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: api-gateway-config
            - secretRef:
                name: api-gateway-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          # tmp dir for uvicorn/gunicorn temp files (readOnlyRootFilesystem requires volumeMount)
          volumeMounts:
            - mountPath: /tmp
              name: tmp-dir
      volumes:
        - name: tmp-dir
          emptyDir: {}
