apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: rental-dev
  labels:
    app: api-gateway
    project: rentalAppLedger
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  # api-gateway is external-facing; other services use ClusterIP
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
