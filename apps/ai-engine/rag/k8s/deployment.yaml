apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rental-dev
  labels:
    app: rag-api
    project: rentalAppLedger
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1   # qa overlay patches to 2
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
        project: rentalAppLedger
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rag-api
          image: "{registry}/rag-api:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 512Mi    # sentence-transformers model needs RAM
            limits:
              cpu: 1000m
              memory: 1Gi
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: chroma-storage
              mountPath: /data
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: rental-dev
  labels:
    app: rag-api
spec:
  type: ClusterIP
  selector:
    app: rag-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  namespace: rental-dev
spec:
  accessModes: [ReadWriteOnce]  # single-writer — only one rag-api pod writes
  resources:
    requests:
      storage: 1Gi
