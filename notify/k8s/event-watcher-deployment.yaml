apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-event-watcher
  namespace: rental-dev
  labels:
    app: k8s-event-watcher
    project: rentalAppLedger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-event-watcher
  template:
    metadata:
      labels:
        app: k8s-event-watcher
        project: rentalAppLedger
    spec:
      serviceAccountName: event-watcher-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: watcher
          image: "{registry}/k8s-event-watcher:latest"
          command: ["python", "k8s_event_watcher.py"]
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          env:
            - name: TARGET_NAMESPACES
              value: "rental-dev,rental-qa"
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: discord-webhook-url
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-watcher-sa
  namespace: rental-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: event-watcher-role
rules:
  - apiGroups: [""]
    resources: [events, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: event-watcher-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: event-watcher-role
subjects:
  - kind: ServiceAccount
    name: event-watcher-sa
    namespace: rental-dev
